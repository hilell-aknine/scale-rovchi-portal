<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <!--sr-funnel-gate--><script>(function(){try{if(location.search.indexOf("dev=1")>-1)return;var e=localStorage.getItem("sr_user_email");var p=localStorage.getItem("sr_concern")||localStorage.getItem("sr_lesson_id")||localStorage.getItem("sr_access_token");if(!e){location.replace("index.html");return;}if(!p){location.replace("survey.html");return;}}catch(_){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חוברת סיכום, סקייל רווחי</title>
  <link rel="stylesheet" href="ds/styles.css" />
  <style>
    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout helpers ──────────────────────────────────── */
    .wrap {
      max-width: 820px;
      width: 100%;
      margin-inline: auto;
      padding-inline: var(--pad-inline-mobile);
    }
    @media (min-width: 768px) {
      .wrap { padding-inline: var(--pad-inline-desktop); }
    }

    /* ── Toolbar (screen only) ───────────────────────────── */
    .toolbar {
      background: var(--navy);
      border-bottom: 1px solid var(--on-dark-line);
      padding-block: var(--s-4);
    }
    .toolbar .wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s-4);
      min-height: 56px;
      flex-wrap: wrap;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--s-2);
      color: rgba(245,248,252,.75);
      text-decoration: none;
      font-size: var(--fs-small);
      font-weight: var(--fw-semibold);
      transition: color var(--dur-hover);
    }
    .back-link:hover { color: #fff; }
    .back-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; flex: none; }

    .btn-print {
      display: inline-flex;
      align-items: center;
      gap: var(--s-2);
      background: var(--grad-brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 0 var(--s-5);
      min-height: 44px;
      font-size: var(--fs-body);
      font-weight: var(--fw-bold);
      font-family: var(--font-body);
      cursor: pointer;
      transition: filter var(--dur-hover), transform var(--dur-hover);
      box-shadow: var(--shadow-blue);
    }
    .btn-print:hover { filter: brightness(1.08); transform: translateY(-2px); }
    .btn-print svg { width: 18px; height: 18px; stroke: currentColor; fill: none; flex: none; }

    /* ── Main ────────────────────────────────────────────── */
    .main-content {
      flex: 1;
      padding-block: var(--s-6) var(--s-8);
    }

    /* ── State cards (loading / error) ───────────────────── */
    .state-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: var(--s-8) var(--s-6);
      text-align: center;
      box-shadow: var(--shadow);
      margin-top: var(--s-5);
    }
    .state-card p {
      color: var(--muted);
      font-size: var(--fs-body-l);
      line-height: var(--lh-relaxed);
      margin-bottom: var(--s-5);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--line);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto var(--s-4);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-external {
      display: inline-flex;
      align-items: center;
      gap: var(--s-2);
      background: var(--grad-brand);
      color: #fff;
      text-decoration: none;
      padding: var(--s-3) var(--s-6);
      border-radius: var(--radius-md);
      font-weight: var(--fw-bold);
      font-size: var(--fs-body);
      transition: filter var(--dur-hover), transform var(--dur-hover);
    }
    .btn-external:hover { filter: brightness(1.08); transform: translateY(-2px); }

    /* ── Workbook sheet ──────────────────────────────────── */
    .sheet {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--s-7) var(--s-6);
      margin-top: var(--s-5);
    }
    @media (min-width: 600px) {
      .sheet { padding: var(--s-8) var(--s-7); }
    }

    /* ── Workbook header ─────────────────────────────────── */
    .wb-header {
      border-bottom: 2px solid var(--line);
      padding-bottom: var(--s-5);
      margin-bottom: var(--s-6);
    }
    .wb-eyebrow {
      font-size: var(--fs-small);
      font-weight: var(--fw-bold);
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: var(--ls-eyebrow);
      margin-bottom: var(--s-2);
    }
    .wb-title {
      font-family: var(--font-heading);
      font-size: var(--fs-h2);
      font-weight: var(--fw-bold);
      color: var(--navy);
      line-height: var(--lh-heading);
    }

    /* ── Section blocks ──────────────────────────────────── */
    .wb-section { margin-top: var(--s-6); }
    .wb-section:first-child { margin-top: 0; }

    .wb-section-title {
      display: flex;
      align-items: center;
      gap: var(--s-2);
      font-family: var(--font-heading);
      font-size: var(--fs-h3);
      font-weight: var(--fw-bold);
      color: var(--navy);
      margin-bottom: var(--s-4);
    }
    .wb-section-title .num {
      flex: none;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--blue-fill);
      color: var(--blue);
      font-size: var(--fs-small);
      font-weight: var(--fw-bold);
    }

    .wb-intro {
      font-size: var(--fs-body-l);
      line-height: var(--lh-relaxed);
      color: var(--ink);
    }

    /* ── Key points ──────────────────────────────────────── */
    .kp-list {
      list-style: none;
      counter-reset: kp;
      display: flex;
      flex-direction: column;
      gap: var(--s-3);
    }
    .kp-list li {
      counter-increment: kp;
      position: relative;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--s-3) var(--s-4) var(--s-3) var(--s-4);
      padding-inline-start: 52px;
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--ink);
    }
    .kp-list li::before {
      content: counter(kp);
      position: absolute;
      inset-inline-start: var(--s-3);
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: var(--fs-small);
      font-weight: var(--fw-bold);
    }

    /* ── Practice questions ──────────────────────────────── */
    .q-list {
      display: flex;
      flex-direction: column;
      gap: var(--s-5);
    }
    .q-item {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--s-5);
      background: var(--surface);
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .q-stem {
      display: flex;
      gap: var(--s-3);
      align-items: flex-start;
      font-size: var(--fs-body-l);
      font-weight: var(--fw-bold);
      color: var(--navy);
      line-height: var(--lh-body);
      margin-bottom: var(--s-4);
    }
    .q-stem .q-num {
      flex: none;
      color: var(--blue);
      font-weight: var(--fw-bold);
    }
    .q-options {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
    }
    .q-options li {
      display: flex;
      align-items: flex-start;
      gap: var(--s-3);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--ink);
      padding: var(--s-2) var(--s-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
    }
    .q-options .opt-marker {
      flex: none;
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--blue-ring);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: var(--fw-bold);
      color: var(--muted);
    }

    /* answer reveal block, visible on screen, prints when expanded */
    .q-answer {
      margin-top: var(--s-4);
      background: var(--success-fill);
      border-inline-start: 4px solid var(--success);
      border-radius: var(--radius-sm);
      padding: var(--s-3) var(--s-4);
    }
    .q-answer .ans-label {
      font-size: var(--fs-small);
      font-weight: var(--fw-bold);
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: var(--ls-eyebrow);
      margin-bottom: var(--s-1);
    }
    .q-answer .ans-correct {
      font-size: var(--fs-body);
      font-weight: var(--fw-semibold);
      color: var(--ink);
      margin-bottom: var(--s-2);
    }
    .q-answer .ans-exp {
      font-size: var(--fs-small);
      line-height: var(--lh-relaxed);
      color: var(--muted);
    }

    /* answer toggle (screen only) */
    .ans-toggle {
      margin-top: var(--s-3);
      display: inline-flex;
      align-items: center;
      gap: var(--s-2);
      background: var(--blue-fill);
      color: var(--blue);
      border: 1.5px solid var(--blue-ring);
      border-radius: var(--radius-md);
      padding: var(--s-2) var(--s-4);
      font-size: var(--fs-small);
      font-weight: var(--fw-semibold);
      cursor: pointer;
      font-family: var(--font-body);
      transition: background var(--dur-hover);
    }
    .ans-toggle:hover { background: rgba(9,146,194,.18); }

    /* ── Personal summary writing area ───────────────────── */
    .write-box {
      border: 1.5px dashed var(--blue-ring);
      border-radius: var(--radius-md);
      padding: var(--s-5);
      background: var(--bg);
    }
    .write-line {
      border-bottom: 1px solid var(--line);
      height: 32px;
    }
    .write-line:last-child { border-bottom: none; }
    .write-hint {
      font-size: var(--fs-small);
      color: var(--muted);
      margin-bottom: var(--s-4);
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer.site-footer {
      background: var(--navy);
      color: rgba(245,248,252,.6);
      border-top: 1px solid var(--on-dark-line);
      padding-block: var(--s-5);
      text-align: center;
      font-size: var(--fs-small);
    }
    footer.site-footer b { color: rgba(245,248,252,.9); font-weight: var(--fw-bold); }

    /* ── Reduced motion ──────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }

    /* ════════════════════════════════════════════════════════
       PRINT, A4, ink-friendly, clean page breaks
       ════════════════════════════════════════════════════════ */
    @media print {
      @page { size: A4; margin: 16mm 14mm; }

      :root {
        /* force readable ink colours on paper */
        --bg: #ffffff;
        --surface: #ffffff;
      }

      html, body {
        background: #ffffff !important;
        color: #000 !important;
        font-size: 12pt;
      }

      /* hide all screen-only chrome */
      .toolbar, .site-footer, .ans-toggle, .no-print { display: none !important; }

      .main-content { padding: 0 !important; }
      .wrap { max-width: none; padding: 0 !important; }

      .sheet {
        box-shadow: none !important;
        border-radius: 0;
        padding: 0 !important;
        margin: 0 !important;
      }

      .wb-title { color: #000 !important; }
      .wb-eyebrow { color: #000 !important; }
      .wb-section-title { color: #000 !important; }

      .kp-list li {
        background: #fff !important;
        border: 1px solid #999 !important;
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .kp-list li::before { background: #000 !important; color: #fff !important; }

      .q-item {
        border: 1px solid #999 !important;
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .q-options li { border: 1px solid #bbb !important; }
      .q-stem, .q-stem .q-num { color: #000 !important; }

      /* always reveal answers on print */
      .q-answer {
        display: block !important;
        background: #f3f3f3 !important;
        border-inline-start: 3px solid #000 !important;
      }
      .q-answer .ans-label,
      .q-answer .ans-correct { color: #000 !important; }
      .q-answer .ans-exp { color: #333 !important; }

      .wb-section { page-break-inside: avoid; }
      .write-box { border: 1.5px dashed #999 !important; background: #fff !important; }
      .write-line { border-bottom: 1px solid #999 !important; }
    }
  </style>
</head>
<body>

<!-- ── Toolbar (screen only) ─────────────────────────────── -->
<header class="toolbar no-print">
  <div class="wrap">
    <a id="back-link" href="lesson.html" class="back-link" aria-label="חזרה לשיעור">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
      חזרה לשיעור
    </a>
    <button id="btn-print" class="btn-print" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
      🖨 הדפס / שמור כ-PDF
    </button>
  </div>
</header>

<!-- ── Main ─────────────────────────────────────────────── -->
<main class="main-content" role="main">
  <div class="wrap">

    <!-- Loading state -->
    <div id="state-loading" class="state-card">
      <div class="spinner" role="status" aria-label="טוען"></div>
      <p>טוען את החוברת...</p>
    </div>

    <!-- Error state -->
    <div id="state-error" class="state-card" style="display:none;" role="alert">
      <p id="error-msg">השיעור לא נמצא. ייתכן שמספר השיעור אינו קיים בקורס.</p>
      <a class="btn-external" href="courses.html">חזרה לקורסים ↗</a>
    </div>

    <!-- Workbook sheet -->
    <article id="sheet" class="sheet" style="display:none;">

      <header class="wb-header">
        <p class="wb-eyebrow">חוברת סיכום</p>
        <h1 id="wb-title" class="wb-title"></h1>
      </header>

      <!-- Intro -->
      <section id="sec-intro" class="wb-section" style="display:none;">
        <p id="wb-intro" class="wb-intro"></p>
      </section>

      <!-- Key points -->
      <section id="sec-kp" class="wb-section" style="display:none;">
        <h2 class="wb-section-title"><span class="num">1</span> נקודות מפתח</h2>
        <ol id="wb-kp" class="kp-list"></ol>
      </section>

      <!-- Practice questions -->
      <section id="sec-q" class="wb-section" style="display:none;">
        <h2 class="wb-section-title"><span class="num">2</span> שאלות לתרגול עצמי</h2>
        <div id="wb-q" class="q-list"></div>
      </section>

      <!-- Personal summary -->
      <section class="wb-section">
        <h2 class="wb-section-title"><span class="num">3</span> סיכום אישי</h2>
        <div class="write-box">
          <p class="write-hint">מה לקחתי מהשיעור? מה איישם השבוע בעסק שלי?</p>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
      </section>

    </article>
  </div>
</main>

<!-- ── Footer ────────────────────────────────────────────── -->
<footer class="site-footer" role="contentinfo">
  נבנה ע"י <b>הלל</b>
</footer>

<!-- ── Scripts (same loader chain as lesson.html) ────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/content.js"></script>
<script>
(function () {
  'use strict';

  function qs(sel) { return document.querySelector(sel); }
  function show(el) { if (el) el.style.display = ''; }
  function hide(el) { if (el) el.style.display = 'none'; }

  /* ─── URL param ─── */
  const params     = new URLSearchParams(location.search);
  const orderRaw   = parseInt(params.get('order') || '', 10);
  const lessonOrder = (!isNaN(orderRaw) && orderRaw >= 1) ? orderRaw : null;

  /* Hebrew letter markers for options (א ב ג ...) */
  const HE_LETTERS = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז', 'ח', 'ט', 'י'];

  function showError(msg) {
    hide(qs('#state-loading'));
    if (msg) qs('#error-msg').textContent = msg;
    show(qs('#state-error'));
  }

  /* ─── Print button ─── */
  qs('#btn-print').addEventListener('click', function () { window.print(); });

  async function init() {
    /* back link points to the matching lesson when we have an order */
    if (lessonOrder) {
      qs('#back-link').href = 'lesson.html?order=' + lessonOrder;
    }

    if (!lessonOrder) {
      showError('לא צוין מספר שיעור. חזרו לקורסים ובחרו שיעור.');
      return;
    }

    try {
      if (typeof window.SRContent === 'undefined' || typeof window.SRContent.ready === 'undefined') {
        throw new Error('content.js לא נטען. בדוק שהקובץ js/content.js קיים.');
      }
      await window.SRContent.ready;

      const lesson = window.SRContent.getLesson(lessonOrder);
      if (!lesson) {
        showError('השיעור לא נמצא. ייתכן שמספר השיעור אינו קיים בקורס.');
        return;
      }

      /* ── Title ── */
      const titleText = 'חוברת סיכום, שיעור ' + lessonOrder + ': ' + (lesson.title || '');
      qs('#wb-title').textContent = 'שיעור ' + lessonOrder + ': ' + (lesson.title || '');
      document.title = titleText + ', סקייל רווחי';

      /* ── Intro (description) ── */
      if (lesson.description) {
        qs('#wb-intro').textContent = lesson.description;
        show(qs('#sec-intro'));
      }

      /* ── Key points ── */
      if (Array.isArray(lesson.key_points) && lesson.key_points.length) {
        const ol = qs('#wb-kp');
        lesson.key_points.forEach(function (pt) {
          const li = document.createElement('li');
          li.textContent = pt;
          ol.appendChild(li);
        });
        show(qs('#sec-kp'));
      }

      /* ── Practice questions ── */
      const questions = Array.isArray(lesson.practice_questions) ? lesson.practice_questions : [];
      if (questions.length) {
        const wrap = qs('#wb-q');
        questions.forEach(function (q, qi) {
          const item = document.createElement('div');
          item.className = 'q-item';

          /* stem */
          const stem = document.createElement('p');
          stem.className = 'q-stem';
          const num = document.createElement('span');
          num.className = 'q-num';
          num.textContent = (qi + 1) + '.';
          const stemTxt = document.createElement('span');
          stemTxt.textContent = q.q || '';
          stem.appendChild(num);
          stem.appendChild(stemTxt);
          item.appendChild(stem);

          /* options */
          const opts = Array.isArray(q.options) ? q.options : [];
          if (opts.length) {
            const ul = document.createElement('ul');
            ul.className = 'q-options';
            opts.forEach(function (opt, oi) {
              const li = document.createElement('li');
              const marker = document.createElement('span');
              marker.className = 'opt-marker';
              marker.textContent = HE_LETTERS[oi] || String(oi + 1);
              const txt = document.createElement('span');
              txt.textContent = opt;
              li.appendChild(marker);
              li.appendChild(txt);
              ul.appendChild(li);
            });
            item.appendChild(ul);
          }

          /* answer block (hidden on screen until toggled; always shown in print) */
          const hasAnswer = typeof q.answer_index === 'number' && opts[q.answer_index] !== undefined;
          if (hasAnswer || q.explanation) {
            const ans = document.createElement('div');
            ans.className = 'q-answer';
            ans.style.display = 'none';

            const label = document.createElement('div');
            label.className = 'ans-label';
            label.textContent = 'התשובה הנכונה';
            ans.appendChild(label);

            if (hasAnswer) {
              const correct = document.createElement('div');
              correct.className = 'ans-correct';
              const letter = HE_LETTERS[q.answer_index] || String(q.answer_index + 1);
              correct.textContent = letter + '. ' + opts[q.answer_index];
              ans.appendChild(correct);
            }
            if (q.explanation) {
              const exp = document.createElement('div');
              exp.className = 'ans-exp';
              exp.textContent = q.explanation;
              ans.appendChild(exp);
            }
            item.appendChild(ans);

            /* screen toggle */
            const toggle = document.createElement('button');
            toggle.type = 'button';
            toggle.className = 'ans-toggle no-print';
            toggle.textContent = '👁 הצג תשובה';
            toggle.addEventListener('click', function () {
              const open = ans.style.display !== 'none';
              ans.style.display = open ? 'none' : 'block';
              toggle.textContent = open ? '👁 הצג תשובה' : '🙈 הסתר תשובה';
            });
            item.appendChild(toggle);
          }

          wrap.appendChild(item);
        });
        show(qs('#sec-q'));
      }

      hide(qs('#state-loading'));
      show(qs('#sheet'));

    } catch (err) {
      showError('שגיאה בטעינה: ' + err.message);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
