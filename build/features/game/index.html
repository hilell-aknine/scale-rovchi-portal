<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <!--sr-funnel-gate--><script>(function(){try{if(location.search.indexOf("dev=1")>-1)return;var e=localStorage.getItem("sr_user_email");var p=localStorage.getItem("sr_concern")||localStorage.getItem("sr_lesson_id")||localStorage.getItem("sr_access_token");if(!e){location.replace("../../index.html");return;}if(!p){location.replace("../../survey.html");return;}}catch(_){}})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סקייל רווחי — תרגול אינטראקטיבי</title>
  <!-- Design System (entry point — imports tokens/base internally) -->
  <link rel="stylesheet" href="../../ds/styles.css">
  <style>
    /* ── Layout shell ── */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── Header ── */
    header {
      padding: var(--s-3) var(--s-5);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      box-shadow: 0 2px 12px rgba(12,37,66,.06);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header img { height: 36px; }

    .mode-pill {
      font-size: var(--fs-micro);
      font-weight: var(--fw-bold);
      letter-spacing: var(--ls-eyebrow);
      background: var(--blue-fill);
      color: var(--blue);
      border: 1px solid var(--blue-ring);
      padding: 4px 12px;
      border-radius: var(--radius-pill);
    }

    /* ── Main container ── */
    main {
      flex: 1;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      padding: var(--s-5) var(--s-4) var(--s-8);
    }

    .hud-wrap { margin-bottom: var(--s-5); }

    /* ── Lesson selector ── */
    .lesson-pick {
      display: flex;
      align-items: center;
      gap: var(--s-2);
      flex-wrap: wrap;
      margin-bottom: var(--s-4);
      font-size: var(--fs-small);
      color: var(--muted);
    }
    .lesson-pick select {
      font-family: inherit;
      font-size: var(--fs-small);
      font-weight: var(--fw-semibold);
      padding: var(--s-1) var(--s-3);
      border-radius: var(--radius-md);
      border: 1.5px solid var(--line);
      background: var(--surface);
      color: var(--navy);
      cursor: pointer;
      transition: border-color var(--dur-hover) var(--smooth);
    }
    .lesson-pick select:focus-visible {
      outline: 3px solid var(--blue);
      outline-offset: 2px;
    }

    /* ══ GAME CARD ══ */
    .g-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: var(--s-5) var(--s-5);
      box-shadow: var(--shadow);
      transition: box-shadow var(--dur-hover) var(--smooth);
    }

    /* ── Topbar: progress + hearts ── */
    .g-topbar {
      display: flex;
      align-items: center;
      gap: var(--s-3);
    }

    .g-progress {
      flex: 1;
      height: 10px;
      background: var(--line);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }
    .g-progress-fill {
      height: 100%;
      background: var(--grad-brand);
      border-radius: var(--radius-pill);
      transition: width .4s var(--smooth);
    }

    .g-hearts {
      display: flex;
      gap: var(--s-1);
      font-size: 1.1rem;
    }
    .g-heart.lost { opacity: .4; filter: grayscale(1); }

    .g-meta {
      font-size: var(--fs-micro);
      color: var(--muted);
      margin-top: var(--s-2);
      font-weight: var(--fw-medium);
    }

    /* ── Question area ── */
    .g-question-area { margin-top: var(--s-5); }

    .g-q {
      font-size: var(--fs-h3);
      font-weight: var(--fw-bold);
      font-family: var(--font-display);
      color: var(--navy);
      line-height: var(--lh-heading);
      margin-bottom: var(--s-5);
    }

    /* ── Answer options ── */
    .g-options {
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
    }
    .g-tf { flex-direction: row; }
    .g-tf .g-opt { flex: 1; text-align: center; }

    .g-opt {
      width: 100%;
      text-align: right;
      background: var(--surface);
      border: 2px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--s-3) var(--s-4);
      font-family: inherit;
      font-size: var(--fs-body);
      font-weight: var(--fw-semibold);
      color: var(--navy);
      cursor: pointer;
      transition: border-color var(--dur-hover) var(--smooth),
                  background var(--dur-hover) var(--smooth),
                  box-shadow var(--dur-hover) var(--smooth),
                  transform var(--dur-tap) var(--spring);
    }
    .g-opt:hover:not(:disabled) {
      border-color: var(--blue);
      background: var(--blue-fill);
      box-shadow: var(--shadow-blue);
      transform: translateY(-2px);
    }
    .g-opt:active:not(:disabled) { transform: translateY(0); }
    .g-opt:disabled { cursor: default; }

    /* Correct / wrong states */
    .g-opt.correct {
      border-color: var(--success);
      background: rgba(16,185,129,.10);
      color: #0a7a52;
      font-weight: var(--fw-bold);
    }
    .g-opt.wrong {
      border-color: var(--red);
      background: var(--red-fill);
      color: var(--red-dark);
      font-weight: var(--fw-bold);
    }

    /* ── Order mode ── */
    .g-order-target {
      min-height: 56px;
      border: 2px dashed var(--blue-ring);
      border-radius: var(--radius-md);
      padding: var(--s-2);
      display: flex;
      flex-wrap: wrap;
      gap: var(--s-2);
      align-items: center;
      margin-bottom: var(--s-4);
      background: var(--blue-fill);
      transition: border-color var(--dur-hover) var(--smooth);
    }
    .g-order-hint {
      color: var(--muted);
      font-size: var(--fs-small);
      padding: var(--s-1) var(--s-2);
    }
    .g-order-pool {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s-2);
      margin-bottom: var(--s-4);
    }

    .g-chip {
      background: var(--surface);
      border: 2px solid var(--line);
      border-radius: var(--radius-pill);
      padding: var(--s-1) var(--s-4);
      font-family: inherit;
      font-size: var(--fs-small);
      font-weight: var(--fw-semibold);
      color: var(--navy);
      cursor: pointer;
      transition: border-color var(--dur-hover) var(--smooth),
                  background var(--dur-hover) var(--smooth),
                  transform var(--dur-tap) var(--spring);
    }
    .g-chip:hover { border-color: var(--blue); background: var(--blue-fill); transform: translateY(-1px); }
    .g-chip.placed { background: var(--bg); border-color: var(--blue-ring); }
    .g-chip.correct { border-color: var(--success); background: rgba(16,185,129,.10); color: #0a7a52; }
    .g-chip.wrong   { border-color: var(--red); background: var(--red-fill); color: var(--red-dark); }

    .g-check {
      width: 100%;
      background: var(--navy);
      color: #fff;
      border: 0;
      border-radius: var(--radius-md);
      padding: var(--s-3);
      font-family: inherit;
      font-weight: var(--fw-bold);
      font-size: var(--fs-body);
      cursor: pointer;
      transition: background var(--dur-hover) var(--smooth), transform var(--dur-tap) var(--spring);
    }
    .g-check:hover:not(:disabled) { background: var(--navy-soft); }
    .g-check:disabled { opacity: .38; cursor: default; }

    /* ── Feedback panel ── */
    .g-feedback { display: none; }
    .g-feedback.show {
      display: block;
      margin-top: var(--s-4);
      border-radius: var(--radius-md);
      padding: var(--s-4) var(--s-4);
      animation: fbin .25s var(--smooth);
    }
    @keyframes fbin {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    .g-feedback.ok {
      background: rgba(16,185,129,.09);
      border: 1.5px solid rgba(16,185,129,.35);
    }
    .g-feedback.no {
      background: var(--red-fill);
      border: 1.5px solid rgba(191,9,47,.25);
    }

    .g-fb-head {
      font-weight: var(--fw-black);
      font-size: var(--fs-body-l);
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .g-fb-xp {
      font-size: var(--fs-small);
      color: var(--success);
      font-weight: var(--fw-black);
      background: rgba(16,185,129,.12);
      padding: 2px 10px;
      border-radius: var(--radius-pill);
    }
    .g-fb-explain {
      font-size: var(--fs-small);
      color: var(--ink);
      line-height: var(--lh-body);
      margin-top: var(--s-2);
    }

    .g-next {
      margin-top: var(--s-3);
      width: 100%;
      background: var(--grad-blue);
      color: #fff;
      border: 0;
      border-radius: var(--radius-md);
      padding: var(--s-3);
      font-family: inherit;
      font-weight: var(--fw-bold);
      font-size: var(--fs-body);
      cursor: pointer;
      transition: filter var(--dur-hover) var(--smooth), transform var(--dur-tap) var(--spring);
    }
    .g-next:hover { filter: brightness(1.08); transform: translateY(-1px); }

    /* ── End screens ── */
    .g-end { text-align: center; }
    .g-end-emoji { font-size: 3.4rem; line-height: 1; margin-bottom: var(--s-2); }
    .g-end-title {
      font-family: var(--font-display);
      font-size: var(--fs-h2);
      font-weight: var(--fw-black);
      color: var(--navy);
      margin-bottom: var(--s-1);
    }
    .g-end-sub {
      color: var(--muted);
      font-size: var(--fs-body);
      margin-bottom: var(--s-5);
    }

    .g-end-stats {
      display: flex;
      gap: var(--s-3);
      justify-content: center;
      margin-bottom: var(--s-5);
    }
    .g-end-stat {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--s-4) var(--s-2);
      transition: box-shadow var(--dur-hover) var(--smooth);
    }
    .g-end-stat .v {
      font-size: var(--fs-h3);
      font-weight: var(--fw-black);
      color: var(--navy);
    }
    .g-end-stat .l {
      font-size: var(--fs-micro);
      color: var(--muted);
      margin-top: var(--s-1);
    }

    .g-end-badge {
      background: var(--blue-fill);
      border: 1.5px solid var(--blue-ring);
      color: var(--navy);
      border-radius: var(--radius-md);
      padding: var(--s-3);
      font-weight: var(--fw-bold);
      font-size: var(--fs-small);
      margin-bottom: var(--s-4);
    }

    .g-end-actions {
      display: flex;
      gap: var(--s-3);
    }
    .g-restart {
      flex: 1;
      background: var(--grad-brand);
      color: #fff;
      border: 0;
      border-radius: var(--radius-md);
      padding: var(--s-3);
      font-family: inherit;
      font-weight: var(--fw-bold);
      font-size: var(--fs-body);
      cursor: pointer;
      transition: filter var(--dur-hover) var(--smooth), transform var(--dur-tap) var(--spring);
    }
    .g-restart:hover { filter: brightness(1.08); transform: translateY(-1px); }

    .g-back {
      flex: 1;
      background: var(--surface);
      color: var(--navy);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--s-3);
      font-family: inherit;
      font-weight: var(--fw-semibold);
      font-size: var(--fs-body);
      cursor: pointer;
      transition: border-color var(--dur-hover) var(--smooth), transform var(--dur-tap) var(--spring);
    }
    .g-back:hover { border-color: var(--navy); transform: translateY(-1px); }

    /* ── End-screen leaderboard ── */
    .g-lb {
      margin: var(--s-5) 0 var(--s-4);
      text-align: right;
    }
    .g-lb-title {
      font-family: var(--font-display);
      font-size: var(--fs-body-l);
      font-weight: var(--fw-black);
      color: var(--navy);
      margin-bottom: var(--s-1);
      display: flex;
      align-items: center;
      gap: var(--s-1);
    }
    .g-lb-sub {
      font-size: var(--fs-micro);
      color: var(--muted);
      margin-bottom: var(--s-3);
    }
    .g-lb-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .g-lb-row {
      display: flex;
      align-items: center;
      gap: var(--s-3);
      padding: var(--s-2) var(--s-3);
      border-radius: var(--radius-md);
      background: var(--bg);
      border: 1px solid transparent;
    }
    .g-lb-row.me {
      border-color: var(--blue);
      background: var(--blue-fill);
    }
    .g-lb-rank {
      flex: 0 0 26px;
      text-align: center;
      font-weight: var(--fw-black);
      color: var(--muted);
      font-size: var(--fs-small);
    }
    .g-lb-name {
      flex: 1;
      text-align: right;
      font-weight: var(--fw-semibold);
      color: var(--navy);
      font-size: var(--fs-small);
      display: flex;
      align-items: center;
      gap: var(--s-1);
    }
    .g-lb-you {
      font-size: var(--fs-micro);
      background: var(--blue);
      color: #fff;
      padding: 1px 8px;
      border-radius: var(--radius-pill);
      font-weight: var(--fw-bold);
    }
    .g-lb-val {
      font-weight: var(--fw-black);
      color: var(--navy);
      font-size: var(--fs-small);
    }
    .g-lb-val .u { font-size: var(--fs-micro); color: var(--muted); font-weight: var(--fw-semibold); }
    .g-lb-placeholder { opacity: .55; }
    .g-lb-note {
      font-size: var(--fs-micro);
      color: var(--muted);
      margin-top: var(--s-2);
    }
    .g-lb-link {
      display: inline-block;
      margin-top: var(--s-3);
      font-size: var(--fs-small);
      font-weight: var(--fw-bold);
      color: var(--blue);
      text-decoration: none;
      border-bottom: 1.5px solid var(--blue-ring);
      padding-bottom: 1px;
    }
    .g-lb-link:hover { border-color: var(--blue); }

    /* ── Footer ── */
    footer {
      padding: var(--s-4);
      text-align: center;
      font-size: var(--fs-micro);
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      main { padding: var(--s-4) var(--s-3) var(--s-7); }
      .g-card { padding: var(--s-4) var(--s-4); }
      .g-end-actions { flex-direction: column; }
      .g-tf { gap: var(--s-2); }
    }
  </style>
</head>
<body>
<header>
  <img src="../../assets/logo-horizontal-black.png" alt="סקייל רווחי">
  <span class="mode-pill" id="mode-pill">MOCK</span>
</header>

<main>
  <div class="hud-wrap"><div id="hud"></div></div>

  <div class="lesson-pick">
    <span>תרגול עבור שיעור:</span>
    <select id="lesson-select"></select>
  </div>

  <div id="game"></div>
</main>

<footer>נבנה ע"י הלל</footer>

<script src="../gamification/gamification.js"></script>
<script src="../leaderboard/leaderboard.js"></script>
<script src="questions.js"></script>
<script src="../../js/content.js"></script>
<script src="game.js"></script>
<script>
  // אתחול גיימיפיקציה משותפת (HUD בראש העמוד)
  var G = window.SRGamification.init({ viewerId: localStorage.getItem('sr_user_email') || 'guest' });
  document.getElementById('mode-pill').textContent = G.mode;
  G.renderHUD('#hud');

  // ממיר פורמט content.js → פורמט game.js.
  // מחזיר null עבור שאלות שלא ניתן לנקד אותן נכון לפי מבנה הנתונים → יסוננו.
  function mapQuestion(q) {
    var type = q.type;
    if (type === 'multiple_choice') type = 'mc';
    else if (type === 'true_false') type = 'tf';
    else if (type === 'order_steps') type = 'order';
    else return null; // סוג לא מוכר — דלג

    var mapped = {
      type: type,
      q: q.q,
      explain: q.explanation || ''
    };

    if (type === 'mc') {
      var opts = Array.isArray(q.options) ? q.options : [];
      if (opts.length < 2) return null;
      var ai = (typeof q.answer_index === 'number' && q.answer_index >= 0 && q.answer_index < opts.length)
        ? q.answer_index : 0;
      mapped.options = opts;
      mapped.answer = ai;
    } else if (type === 'tf') {
      // answer_index: 0 = נכון, 1 = לא נכון
      mapped.answer = (q.answer_index === 0);
    } else if (type === 'order') {
      // מבנה ה-order_steps בדאטה אינו מקודד תמורה מלאה תקינה
      // (ה-options מכילים מסיחים, ו-answer_index אינו רצף) → לא ניתן לנקד אמין.
      // עדיף לסנן מאשר לסמן תשובה נכונה כשגויה.
      return null;
    }

    return mapped;
  }

  // הצגת מצב ריק
  function showEmpty(title) {
    document.getElementById('game').innerHTML =
      '<div class="g-card" style="text-align:center;padding:2.5rem 1.5rem">' +
        '<div style="font-size:2.5rem;margin-bottom:.8rem">📝</div>' +
        '<div style="font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--navy);margin-bottom:.5rem">' +
          'התרגול לשיעור זה בהכנה' +
        '</div>' +
        '<div style="color:var(--muted);font-size:.92rem">' +
          (title ? 'שיעור: ' + title + '<br>' : '') +
          'החומר מתעדכן בקרוב. חזור מאוחר יותר.' +
        '</div>' +
      '</div>';
  }

  // קריאת order מה-URL (?order=N), אחרת 1
  var params = new URLSearchParams(location.search);
  var sel = document.getElementById('lesson-select');
  var initOrder = parseInt(params.get('order'), 10) || 1;
  var game;

  // כותרת לשיעור לפי order (מה-SRContent), עם נפילה אלגנטית
  function titleFor(order) {
    var lesson = SRContent.getLesson(order);
    if (lesson && lesson.title) return 'שיעור ' + order + ': ' + lesson.title;
    return 'שיעור ' + order;
  }

  function launch(order) {
    var lessonTitle = titleFor(order);
    document.getElementById('game').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted)">טוען שאלות…</div>';

    var raw = SRContent.getQuestions(order);
    // מיפוי + סינון שאלות שלא ניתן לנקד אמין (mapQuestion מחזיר null)
    var questions = (raw || []).map(mapQuestion).filter(function (q) { return q; });

    if (questions.length === 0) {
      showEmpty(lessonTitle);
      return;
    }

    // זריקת השאלות ישירות לתוך SRGame (עוקפת את SRQuestions.getForLesson / questions.js)
    game = new window.SRGame({
      mount: '#game',
      lessonId: 'order-' + order,
      lessonTitle: lessonTitle,
      questions: questions,
      onFinish: function (result) {
        window.location.href = '../../lesson.html?order=' + order;
      }
    });
    game.start();
  }

  sel.addEventListener('change', function () {
    var order = parseInt(sel.value, 10) || 1;
    launch(order);
  });

  // בניית הבורר דינמית מכל השיעורים בפועל (תמיד תואם את מספר השיעורים האמיתי)
  SRContent.ready.then(function () {
    var lessons = SRContent.getLessons() || [];
    if (lessons.length === 0) {
      // נפילה: לפחות שיעור אחד כדי שהבורר לא יישאר ריק
      lessons = [{ order: initOrder, title: '' }];
    }
    sel.innerHTML = lessons.map(function (l) {
      var label = 'שיעור ' + l.order + (l.title ? ': ' + l.title : '');
      return '<option value="' + l.order + '">' + label + '</option>';
    }).join('');

    // בחירת השיעור ההתחלתי אם קיים, אחרת הראשון
    var exists = lessons.some(function (l) { return l.order === initOrder; });
    var startOrder = exists ? initOrder : (lessons[0] ? lessons[0].order : 1);
    sel.value = String(startOrder);

    launch(startOrder);
  });
</script>
</body>
</html>
