<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <!--sr-funnel-gate--><script>(function(){try{if(location.search.indexOf("dev=1")>-1)return;var e=localStorage.getItem("sr_user_email");var p=localStorage.getItem("sr_concern")||localStorage.getItem("sr_lesson_id")||localStorage.getItem("sr_access_token");if(!e){location.replace("index.html");return;}if(!p){location.replace("survey.html");return;}}catch(_){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הניתוח האישי שלך | סקייל רווחי</title>
  <link rel="stylesheet" href="ds/styles.css" />
  <script src="js/survey-config.js"></script>
  <style>
    /* ── Analysis-page layout (tokens from ds/styles.css) ──── */
    :root { --font-display: 'Heebo', 'Assistant', system-ui, sans-serif; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding-inline: var(--pad-inline-mobile);
    }
    @media (min-width: 768px) { .wrap { padding-inline: var(--pad-inline-desktop); } }

    /* ── Header ─────────────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(12, 37, 66, .92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--on-dark-line);
    }
    .site-header .wrap {
      max-width: var(--container);
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .brand-lockup { display: inline-flex; align-items: center; }
    .brand-lockup img { height: 34px; width: auto; display: block; }

    /* ── Hero band (navy, dramatic) ─────────────────────── */
    .analysis-hero {
      position: relative;
      background: var(--navy);
      color: #fff;
      overflow: hidden;
      padding-block: var(--s-8) var(--s-7);
      text-align: center;
    }
    .analysis-hero .glow-a {
      position: absolute; width: 480px; height: 480px;
      top: -200px; right: -140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(9,146,194,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .analysis-hero .glow-b {
      position: absolute; width: 380px; height: 380px;
      bottom: -240px; left: -100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(191,9,47,.13) 0%, transparent 70%);
      pointer-events: none;
    }
    .analysis-hero .wrap { position: relative; z-index: 2; }

    /* eyebrow */
    .eyebrow {
      display: inline-flex; align-items: center; gap: var(--s-2);
      font-size: var(--fs-small); font-weight: var(--fw-bold); color: var(--blue-light);
      letter-spacing: var(--ls-eyebrow); margin-bottom: var(--s-4);
    }
    .eyebrow .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--grad-brand);
      flex: none;
    }

    .analysis-hero h1 {
      font-family: var(--font-display);
      font-weight: var(--fw-black);
      font-size: var(--fs-h1);
      line-height: var(--lh-heading);
      letter-spacing: var(--ls-heading);
      color: #fff;
      max-width: 22ch;
      margin: 0 auto;
      opacity: 0; transform: translateY(16px);
      animation: rise 700ms var(--smooth) 100ms forwards;
    }
    @keyframes rise { to { opacity: 1; transform: none; } }

    .hero-sub {
      font-size: var(--fs-body-l);
      color: rgba(245,248,252,.78);
      margin-top: var(--s-3);
      opacity: 0; transform: translateY(14px);
      animation: rise 700ms var(--smooth) 250ms forwards;
    }

    /* ── Main content area ──────────────────────────────── */
    .analysis-stage {
      flex: 1;
      padding-block: var(--s-8);
    }

    /* ── Diagnosis card ─────────────────────────────────── */
    .diag-card {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-modal);
      overflow: hidden;
      opacity: 0; transform: translateY(24px);
      animation: rise 600ms var(--smooth) 380ms forwards;
    }

    /* top accent bar — brand gradient */
    .diag-card__accent {
      height: 5px;
      background: var(--grad-brand);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .diag-card__body {
      padding: var(--s-6) var(--s-6) var(--s-5);
    }
    @media (min-width: 600px) {
      .diag-card__body { padding: var(--s-7) var(--s-7) var(--s-6); }
    }

    .diag-card__label {
      font-size: var(--fs-micro);
      font-weight: var(--fw-bold);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--s-2);
    }

    .diag-card__title {
      font-family: var(--font-heading);
      font-weight: var(--fw-black);
      font-size: var(--fs-h2);
      color: var(--navy);
      line-height: var(--lh-heading);
      letter-spacing: var(--ls-heading);
      margin-bottom: var(--s-5);
    }

    .diag-card__divider {
      border: none;
      border-top: 1px solid var(--line);
      margin-bottom: var(--s-5);
    }

    .diag-card__section-label {
      font-size: var(--fs-micro);
      font-weight: var(--fw-bold);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--s-2);
    }

    .diag-card__text {
      font-size: var(--fs-body-l);
      line-height: var(--lh-relaxed);
      color: var(--ink);
      margin-bottom: var(--s-6);
    }

    /* meta grid — goal + recommendation */
    .diag-meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--s-4);
      margin-bottom: var(--s-6);
    }
    @media (min-width: 560px) {
      .diag-meta-grid { grid-template-columns: 1fr 1fr; }
    }

    .diag-meta-box {
      position: relative;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--s-4) var(--s-5);
      overflow: hidden;
    }
    /* left accent stripe (matches pain-card pattern from index.html) */
    .diag-meta-box::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--grad-brand);
      border-radius: var(--radius-md) 0 0 var(--radius-md);
    }
    .diag-meta-box .meta-label {
      font-size: var(--fs-micro);
      font-weight: var(--fw-bold);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--s-1);
    }
    .diag-meta-box p {
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--ink);
    }

    /* ── CTA section ────────────────────────────────────── */
    .diag-card__cta {
      padding: var(--s-5) var(--s-6) var(--s-6);
      background: var(--bg);
      border-top: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: var(--s-3);
    }
    @media (min-width: 600px) {
      .diag-card__cta { padding: var(--s-5) var(--s-7) var(--s-7); }
    }

    .btn-primary-grad {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center; gap: var(--s-2);
      flex-direction: row-reverse;
      min-height: 58px;
      padding: 0 var(--s-6);
      border-radius: var(--radius-md); border: none; cursor: pointer;
      font-family: var(--font-body); font-weight: var(--fw-bold); font-size: var(--fs-body-l);
      background: var(--grad-brand);
      color: #fff;
      box-shadow: 0 8px 28px rgba(9,146,194,.35);
      text-decoration: none;
      transition: transform var(--dur-hover) ease, filter var(--dur-hover) ease;
      width: 100%;
    }
    .btn-primary-grad::after {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      box-shadow: 0 0 0 0 rgba(9,146,194,.45);
      animation: cta-pulse 2600ms var(--smooth) infinite;
    }
    @keyframes cta-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(9,146,194,.40); }
      70%  { box-shadow: 0 0 0 16px rgba(9,146,194,0); }
      100% { box-shadow: 0 0 0 0 rgba(9,146,194,0); }
    }
    .btn-primary-grad:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .btn-primary-grad:focus-visible {
      outline: 3px solid var(--blue-ring);
      outline-offset: 3px;
    }
    .btn-icon { width: 18px; height: 18px; stroke: currentColor; fill: none; flex: none; }

    .btn-secondary-link {
      display: block;
      text-align: center;
      font-family: var(--font-body); font-size: var(--fs-body); font-weight: var(--fw-medium);
      color: var(--muted);
      text-decoration: underline;
      background: transparent; border: none; cursor: pointer;
      transition: color var(--dur-hover);
      text-decoration-color: transparent;
      padding: var(--s-1) 0;
    }
    .btn-secondary-link:hover { color: var(--navy); text-decoration-color: var(--navy); }
    .btn-secondary-link:focus-visible { outline: 2px solid var(--blue-ring); border-radius: var(--radius-sm); }

    /* ── Error state ────────────────────────────────────── */
    .sr-error-state {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--s-7) var(--s-6);
      text-align: center;
    }
    .sr-error-state h2 {
      font-size: var(--fs-h3);
      font-weight: var(--fw-bold);
      color: var(--red);
      margin-bottom: var(--s-3);
    }
    .sr-error-state p {
      font-size: var(--fs-body);
      color: var(--muted);
      line-height: var(--lh-relaxed);
      margin-bottom: var(--s-5);
      max-width: 40ch;
      margin-inline: auto;
    }

    /* ── Scroll reveal ──────────────────────────────────── */
    .reveal {
      transition: opacity var(--dur-reveal) ease, transform var(--dur-reveal) var(--smooth);
    }
    html.js .reveal:not(.in) { opacity: 0; transform: translateY(24px); }

    @media (prefers-reduced-motion: reduce) {
      .analysis-hero h1, .hero-sub, .diag-card { animation: none !important; opacity: 1 !important; transform: none !important; }
      .btn-primary-grad::after { animation: none !important; }
      .reveal { opacity: 1 !important; transform: none !important; }
    }

    /* ── Footer ─────────────────────────────────────────── */
    footer.site-footer {
      background: var(--navy);
      color: rgba(245,248,252,.7);
      border-top: 1px solid var(--on-dark-line);
    }
    footer.site-footer .wrap {
      max-width: var(--container);
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: var(--s-4); padding-block: var(--s-5);
    }
    footer.site-footer .built { font-size: var(--fs-small); }
    footer.site-footer .built b { color: #fff; font-weight: var(--fw-bold); }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .analysis-hero h1 { font-size: var(--fs-h2); }
      .diag-card__title { font-size: var(--fs-h3); }
    }
  </style>
</head>
<body>
  <script>document.documentElement.classList.add('js');</script>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="wrap">
      <a class="brand-lockup" href="index.html" aria-label="סקייל רווחי">
        <img src="assets/logo-horizontal-white.png" alt="סקייל רווחי">
      </a>
    </div>
  </header>

  <!-- ── Hero band ──────────────────────────────────────── -->
  <section class="analysis-hero" aria-labelledby="analysis-heading">
    <div class="glow-a" aria-hidden="true"></div>
    <div class="glow-b" aria-hidden="true"></div>
    <div class="wrap">
      <span class="eyebrow"><span class="dot" aria-hidden="true"></span>האבחון שלך</span>
      <h1 id="analysis-heading">הניתוח האישי שלך מוכן</h1>
      <p class="hero-sub">על בסיס תשובותיך — זיהינו את נקודת החיכוך המדויקת ומה שיזיז אותך הכי מהר קדימה.</p>
    </div>
  </section>

  <!-- ── Diagnosis content ──────────────────────────────── -->
  <main class="analysis-stage" id="sr-main" role="main" aria-live="polite">
    <!-- JS renders here -->
  </main>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <footer class="site-footer">
    <div class="wrap">
      <a class="brand-lockup" href="index.html" aria-label="סקייל רווחי">
        <img src="assets/logo-horizontal-white.png" alt="סקייל רווחי" style="height:30px;width:auto">
      </a>
      <span class="built">נבנה ע"י <b>הלל</b></span>
    </div>
  </footer>

  <script>
  (function () {
    'use strict';

    var concern = localStorage.getItem('sr_concern');
    var main = document.getElementById('sr-main');

    /* ---- מצב שגיאה: concern ריק ---- */
    if (!concern) {
      main.innerHTML =
        '<div class="wrap"><div class="sr-error-state">' +
          '<h2>לא נמצאו תשובות לשאלון</h2>' +
          '<p>כדי לקבל את הניתוח האישי שלך, יש להשלים תחילה את שאלון ההתאמה.</p>' +
          '<a href="survey.html" class="btn-primary-grad" style="max-width:260px;margin-inline:auto">חזרה לשאלון</a>' +
        '</div></div>';
      return;
    }

    /* ---- בדיקת תלות: window.SURVEY ---- */
    if (typeof window.SURVEY === 'undefined' ||
        typeof window.SURVEY.analysisContent === 'undefined' ||
        typeof window.SURVEY.lessonMap === 'undefined') {
      main.innerHTML =
        '<div class="wrap"><div class="sr-error-state">' +
          '<h2>שגיאת טעינה</h2>' +
          '<p>לא ניתן לטעון את מנוע ההתאמה. אנא רענן את הדף.</p>' +
          '<a href="survey.html" class="btn-primary-grad" style="max-width:260px;margin-inline:auto">חזרה לשאלון</a>' +
        '</div></div>';
      return;
    }

    var content = window.SURVEY.analysisContent[concern];

    /* ---- מצב שגיאה: concern לא מוכר ---- */
    if (!content) {
      main.innerHTML =
        '<div class="wrap"><div class="sr-error-state">' +
          '<h2>לא נמצא ניתוח מתאים</h2>' +
          '<p>סוג הדאגה שנשמר לא מוכר במערכת. נסה למלא את השאלון מחדש.</p>' +
          '<a href="survey.html" class="btn-primary-grad" style="max-width:260px;margin-inline:auto">חזרה לשאלון</a>' +
        '</div></div>';
      return;
    }

    /* ---- בניית כתובת URL לשיעור המומלץ ---- */
    var lessonHref = concern
      ? 'lesson.html?rec=' + encodeURIComponent(concern)
      : 'courses.html';

    /* ---- meta boxes (goal + recommendation) ---- */
    var goalHtml = content.goal
      ? '<div class="diag-meta-box">' +
          '<div class="meta-label">המטרה שלך</div>' +
          '<p>' + _esc(content.goal) + '</p>' +
        '</div>'
      : '';

    var recommendationHtml = content.recommendation
      ? '<div class="diag-meta-box">' +
          '<div class="meta-label">ההמלצה שלנו</div>' +
          '<p>' + _esc(content.recommendation) + '</p>' +
        '</div>'
      : '';

    var metaGrid = (goalHtml || recommendationHtml)
      ? '<div class="diag-meta-grid">' + goalHtml + recommendationHtml + '</div>'
      : '';

    /* ---- render ---- */
    main.innerHTML =
      '<div class="wrap">' +
        '<article class="diag-card" aria-label="ניתוח אישי">' +
          '<div class="diag-card__accent" aria-hidden="true"></div>' +
          '<div class="diag-card__body">' +
            '<div class="diag-card__label">ניתוח אישי</div>' +
            '<h2 class="diag-card__title">' + _esc(content.title) + '</h2>' +
            '<hr class="diag-card__divider" />' +
            '<div class="diag-card__section-label">אבחון</div>' +
            '<p class="diag-card__text">' + _esc(content.body) + '</p>' +
            metaGrid +
          '</div>' +
          '<div class="diag-card__cta">' +
            '<a href="' + lessonHref + '" class="btn-primary-grad">' +
              '<svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
              'התחל מהשיעור שמתאים לך' +
            '</a>' +
            '<a href="courses.html" class="btn-secondary-link">עבור למרכז הלמידה</a>' +
          '</div>' +
        '</article>' +
      '</div>';

    /* ---- scroll reveal on injected card ---- */
    (function () {
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var els = main.querySelectorAll('.reveal');
      if (reduce || !('IntersectionObserver' in window)) {
        els.forEach(function (e) { e.classList.add('in'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      els.forEach(function (e) { io.observe(e); });
    })();

    /* ---- XSS escape ---- */
    function _esc(str) {
      if (typeof str !== 'string') return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  })();
  </script>

</body>
</html>
