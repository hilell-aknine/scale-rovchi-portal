<html lang="he" dir="rtl">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חוברת סיכום, סקייל רווחי</title>

  <!-- Heebo (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ════════════════════════════════════════════════════════
       BRAND TOKENS (local, no external CSS so PDF is self-contained)
       ════════════════════════════════════════════════════════ */
    :root {
      --navy:#0c2542;
      --navy-2:#143458;
      --blue:#0992c2;
      --blue-light:#5b99c3;
      --red:#bf092f;
      --red-dark:#911220;
      --bg:#eef3f9;
      --surface:#ffffff;
      --ink:#1d2733;
      --muted:#5a6b7a;
      --muted-soft:#7d8b98;
      --line:rgba(12,37,66,.10);
      --line-strong:rgba(12,37,66,.16);
      --success:#10b981;
      --blue-fill:rgba(9,146,194,.08);
      --blue-fill-2:rgba(9,146,194,.14);
      --blue-ring:rgba(9,146,194,.26);
      --red-fill:rgba(191,9,47,.07);
      --red-ring:rgba(191,9,47,.22);
      --success-fill:rgba(16,185,129,.10);
      --grad-brand:linear-gradient(120deg,#0992c2 0%,#5b99c3 45%,#bf092f 78%,#911220 100%);
      --grad-navy:linear-gradient(135deg,#0c2542 0%,#143458 60%,#0c2542 100%);
      --grad-blue:linear-gradient(135deg,#0992c2 0%,#5b99c3 100%);
      --shadow-card:0 2px 10px rgba(12,37,66,.05);
      --shadow-soft:0 6px 22px rgba(12,37,66,.10);
      --font:'Heebo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    /* ── Print page setup (this is the whole point of the file) ── */
    @page { size:A4; margin:0; }

    html { -webkit-print-color-adjust:exact; print-color-adjust:exact; }

    body {
      font-family:var(--font);
      color:var(--ink);
      background:var(--bg);
      line-height:1.62;
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
      font-size:11pt;
    }

    /* Inner A4 padding band, ~15mm for professional, mobile-readable margins.
       Extra top/bottom room so the running brand header/footer never collide with content. */
    .page {
      padding:14mm 15mm 18mm;
      max-width:210mm;
      margin-inline:auto;
    }

    /* ════════════════════════════════════════════════════════
       RUNNING BRAND HEADER + FOOTER (prints on every A4 page)
       position:fixed repeats on each printed page in Chromium.
       ════════════════════════════════════════════════════════ */
    .run-head, .run-foot {
      position:fixed;
      inset-inline:0;
      z-index:50;
      pointer-events:none;
      display:flex;
      align-items:center;
    }
    /* thin brand gradient ribbon pinned to the very top of every page */
    .run-head {
      top:0;
      height:6px;
      background:var(--grad-brand);
    }
    /* footer band: brand name + gradient hairline, on every page */
    .run-foot {
      bottom:0;
      height:11mm;
      padding:0 15mm;
      justify-content:space-between;
      gap:10px;
      font-size:8pt;
      color:var(--muted-soft);
      background:linear-gradient(180deg,rgba(238,243,249,0),var(--bg) 55%);
    }
    .run-foot::before {
      content:"";
      position:absolute;
      inset-inline:15mm;
      top:0;
      height:2px;
      border-radius:2px;
      background:var(--grad-brand);
      opacity:.55;
    }
    .run-foot .brand {
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-weight:800;
      letter-spacing:.02em;
      color:var(--navy);
    }
    .run-foot .brand .dot {
      width:13px; height:13px;
      border-radius:4px;
      background:var(--grad-brand);
      display:inline-block;
      box-shadow:0 2px 5px rgba(191,9,47,.30);
    }
    .run-foot .tag { font-weight:600; color:var(--muted); }

    svg { display:block; }

    /* ════════════════════════════════════════════════════════
       COVER BAND
       ════════════════════════════════════════════════════════ */
    .cover {
      position:relative;
      background:var(--grad-navy);
      border-radius:18px;
      overflow:hidden;
      padding:28px 30px 30px;
      margin-bottom:24px;
      break-inside:avoid;
      page-break-inside:avoid;
      box-shadow:var(--shadow-soft);
    }
    /* gradient ribbon along the top edge */
    .cover::before {
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height:7px;
      background:var(--grad-brand);
    }
    /* soft geometric glow */
    .cover::after {
      content:"";
      position:absolute;
      inset-inline-start:-80px;
      top:-90px;
      width:260px; height:260px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(9,146,194,.30) 0%,rgba(9,146,194,0) 70%);
      pointer-events:none;
    }
    /* decorative emblem watermark */
    .cover .emblem {
      position:absolute;
      inset-inline-end:-34px;
      bottom:-38px;
      width:208px;
      height:208px;
      opacity:.13;
      object-fit:contain;
      pointer-events:none;
      z-index:0;
    }
    .cover-top {
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:26px;
    }
    .cover-logo {
      height:56px;
      width:auto;
      display:block;
      filter:drop-shadow(0 3px 10px rgba(0,0,0,.28));
    }
    /* brand tagline under the logo on the cover */
    .cover-tagline {
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:9px;
      margin:11px 0 22px;
      font-size:10.5pt;
      font-weight:700;
      letter-spacing:.05em;
      color:#9ec7e3;
    }
    .cover-tagline::before {
      content:"";
      width:26px; height:3px;
      border-radius:2px;
      background:var(--grad-brand);
      flex:none;
    }
    .cover-eyebrow {
      font-size:9.5pt;
      font-weight:700;
      letter-spacing:.16em;
      color:#dbeaf5;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      padding:6px 15px;
      border-radius:999px;
      white-space:nowrap;
    }
    .cover-meta {
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }
    .cover-lessonnum {
      display:inline-flex;
      align-items:baseline;
      gap:7px;
      font-weight:800;
      color:#fff;
      background:var(--grad-brand);
      padding:7px 17px;
      border-radius:11px;
      box-shadow:0 6px 18px rgba(191,9,47,.28);
    }
    .cover-lessonnum .lbl { font-size:9.5pt; letter-spacing:.06em; opacity:.92; }
    .cover-lessonnum .n { font-size:16pt; }
    .cover-meta .rule {
      flex:1;
      height:1px;
      background:linear-gradient(90deg,rgba(255,255,255,.22),rgba(255,255,255,0));
    }
    .cover-title {
      position:relative;
      z-index:1;
      font-size:23pt;
      font-weight:800;
      color:#fff;
      line-height:1.28;
      max-width:80%;
      letter-spacing:-.01em;
    }

    /* ════════════════════════════════════════════════════════
       SECTION TITLES
       ════════════════════════════════════════════════════════ */
    .section { margin-bottom:22px; }
    .section-head {
      display:flex;
      align-items:center;
      gap:11px;
      margin-bottom:15px;
    }
    .section-head .ico {
      flex:none;
      width:34px; height:34px;
      border-radius:10px;
      display:grid; place-items:center;
      background:var(--grad-blue);
      color:#fff;
      box-shadow:0 4px 12px rgba(9,146,194,.26);
    }
    .section-head .ico.red {
      background:linear-gradient(135deg,#bf092f 0%,#911220 100%);
      box-shadow:0 4px 12px rgba(191,9,47,.26);
    }
    .section-head .ico.navy {
      background:var(--grad-navy);
      box-shadow:0 4px 12px rgba(12,37,66,.26);
    }
    .section-head .ico svg { width:18px; height:18px; }
    .section-head h2 {
      position:relative;
      font-size:14.5pt;
      font-weight:800;
      color:var(--navy);
      letter-spacing:-.01em;
      padding-bottom:5px;
    }
    /* brand gradient underline on every section title */
    .section-head h2::after {
      content:"";
      position:absolute;
      inset-inline-start:0;
      bottom:0;
      width:46px;
      height:3px;
      border-radius:2px;
      background:var(--grad-brand);
    }
    .section-head .count {
      margin-inline-start:auto;
      font-size:9pt;
      font-weight:700;
      color:var(--muted);
      background:var(--blue-fill);
      border:1px solid var(--line);
      padding:3px 11px;
      border-radius:999px;
    }

    /* ── Intro card ── */
    .intro {
      position:relative;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px 20px 18px 22px;
      font-size:11pt;
      line-height:1.74;
      color:var(--ink);
      box-shadow:var(--shadow-card);
      break-inside:avoid;
      page-break-inside:avoid;
    }
    .intro::before {
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:5px;
      border-radius:0 14px 14px 0;
      background:var(--grad-blue);
    }
    .intro .quote-mark {
      position:absolute;
      top:8px; inset-inline-start:14px;
      font-size:34pt;
      line-height:1;
      font-weight:900;
      color:var(--blue-fill-2);
      font-family:Georgia,serif;
    }

    /* ════════════════════════════════════════════════════════
       KEY POINTS, infographic cards
       ════════════════════════════════════════════════════════ */
    .kp { list-style:none; display:flex; flex-direction:column; gap:11px; }
    .kp li {
      position:relative;
      display:flex;
      align-items:stretch;
      gap:0;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:13px;
      overflow:hidden;
      box-shadow:var(--shadow-card);
      break-inside:avoid;
      page-break-inside:avoid;
    }
    .kp .num-band {
      flex:none;
      width:54px;
      display:grid;
      place-items:center;
      background:var(--grad-navy);
      color:#fff;
      position:relative;
    }
    .kp li:nth-child(even) .num-band { background:var(--grad-blue); }
    .kp li:nth-child(3n) .num-band { background:linear-gradient(135deg,#bf092f 0%,#911220 100%); }
    .kp .num-band .n {
      font-size:19pt;
      font-weight:900;
      line-height:1;
    }
    .kp .body {
      flex:1;
      display:flex;
      align-items:center;
      gap:13px;
      padding:14px 16px;
    }
    .kp .body .tick {
      flex:none;
      width:22px; height:22px;
      color:var(--blue);
    }
    .kp li:nth-child(3n) .body .tick { color:var(--red); }
    .kp .txt {
      font-size:11pt;
      line-height:1.62;
      color:var(--ink);
      font-weight:500;
    }

    /* ── Steps flow (infographic diagram derived from key points when 3-6 items) ── */
    .flow {
      display:flex;
      align-items:stretch;
      gap:0;
      margin:2px 0 18px;
      break-inside:avoid;
      page-break-inside:avoid;
    }
    .flow .step {
      flex:1;
      position:relative;
      text-align:center;
      padding:0 4px;
    }
    .flow .step .bubble {
      width:38px; height:38px;
      margin:0 auto 7px;
      border-radius:50%;
      display:grid; place-items:center;
      color:#fff;
      font-size:13pt;
      font-weight:900;
      background:var(--grad-blue);
      box-shadow:0 3px 9px rgba(9,146,194,.30);
      position:relative;
      z-index:1;
    }
    .flow .step:nth-child(even) .bubble { background:var(--grad-navy); }
    .flow .step .cap {
      font-size:8.5pt;
      font-weight:700;
      color:var(--muted);
      line-height:1.35;
    }
    /* connector line behind bubbles */
    .flow .step::before {
      content:"";
      position:absolute;
      top:19px;
      inset-inline-start:50%;
      width:100%;
      height:2px;
      background:repeating-linear-gradient(90deg,var(--blue-ring) 0 5px,transparent 5px 10px);
      z-index:0;
    }
    .flow .step:last-child::before { display:none; }

    /* ════════════════════════════════════════════════════════
       PRACTICE QUESTIONS
       ════════════════════════════════════════════════════════ */
    .q { display:flex; flex-direction:column; gap:16px; }
    .q-item {
      position:relative;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:15px;
      padding:18px 20px 17px;
      box-shadow:var(--shadow-card);
      break-inside:avoid;
      page-break-inside:avoid;
    }
    .q-item::before {
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height:4px;
      border-radius:15px 15px 0 0;
      background:var(--grad-brand);
      opacity:.85;
    }
    .q-top {
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }
    .q-num {
      flex:none;
      min-width:30px; height:30px;
      border-radius:9px;
      background:var(--grad-navy);
      color:#fff;
      display:grid; place-items:center;
      font-size:12pt;
      font-weight:800;
      padding:0 7px;
      box-shadow:0 3px 9px rgba(12,37,66,.22);
    }
    .q-tag {
      display:inline-flex;
      align-items:center;
      gap:5px;
      font-size:8pt;
      font-weight:800;
      color:var(--blue);
      background:var(--blue-fill);
      border:1px solid var(--blue-ring);
      border-radius:999px;
      padding:3px 10px;
      letter-spacing:.03em;
    }
    .q-tag svg { width:11px; height:11px; }
    .q-stem {
      font-size:12pt;
      font-weight:700;
      color:var(--navy);
      line-height:1.55;
      margin-bottom:13px;
    }
    .opts { list-style:none; display:flex; flex-direction:column; gap:8px; }
    .opts li {
      display:flex;
      align-items:center;
      gap:12px;
      font-size:10.5pt;
      line-height:1.5;
      color:var(--ink);
      padding:10px 13px;
      border:1px solid var(--line-strong);
      border-radius:11px;
      background:#fff;
    }
    .opts li.correct {
      border-color:var(--success);
      background:var(--success-fill);
      font-weight:600;
    }
    .opts .marker {
      flex:none;
      width:25px; height:25px;
      border:1.5px solid var(--blue-ring);
      border-radius:8px;
      display:grid; place-items:center;
      font-size:10pt;
      font-weight:800;
      color:var(--muted);
      background:var(--blue-fill);
    }
    .opts li.correct .marker {
      border-color:var(--success);
      background:var(--success);
      color:#fff;
    }
    .opts .check {
      flex:none;
      margin-inline-start:auto;
      display:inline-flex;
      align-items:center;
      gap:4px;
      color:var(--success);
      font-weight:800;
      font-size:9.5pt;
    }
    .opts .check svg { width:13px; height:13px; }

    /* answer callout, highlight box */
    .answer {
      margin-top:13px;
      position:relative;
      background:linear-gradient(135deg,rgba(9,146,194,.10),rgba(9,146,194,.04));
      border:1px solid var(--blue-ring);
      border-radius:12px;
      padding:13px 15px 13px 17px;
      overflow:hidden;
    }
    .answer::before {
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:5px;
      background:var(--grad-blue);
    }
    .answer .lbl {
      display:inline-flex;
      align-items:center;
      gap:5px;
      font-size:8.5pt;
      font-weight:800;
      letter-spacing:.08em;
      color:var(--blue);
      margin-bottom:7px;
      text-transform:uppercase;
    }
    .answer .lbl svg { width:13px; height:13px; }
    .answer .correct-line {
      font-size:11pt;
      font-weight:800;
      color:var(--navy);
      margin-bottom:6px;
    }
    .answer .exp {
      font-size:10pt;
      line-height:1.62;
      color:var(--muted);
    }
    /* order_steps: thinking prompt with no marked answer */
    .think-lines { margin-top:13px; display:flex; flex-direction:column; gap:0; }
    .think-lines .ln {
      border-bottom:1.5px dotted var(--blue-ring);
      height:32px;
    }

    /* ════════════════════════════════════════════════════════
       PERSONAL NOTES
       ════════════════════════════════════════════════════════ */
    .notes {
      position:relative;
      border:1.5px dashed var(--blue-ring);
      border-radius:15px;
      padding:18px 20px 10px;
      background:linear-gradient(180deg,rgba(9,146,194,.03),#fff);
      break-inside:avoid;
      page-break-inside:avoid;
    }
    .notes .hint {
      display:flex;
      align-items:center;
      gap:8px;
      font-size:10pt;
      font-weight:600;
      color:var(--muted);
      margin-bottom:15px;
    }
    .notes .hint svg { width:16px; height:16px; flex:none; color:var(--blue); }
    .notes .ln {
      border-bottom:1px solid var(--line-strong);
      height:33px;
    }

    /* ════════════════════════════════════════════════════════
       CLOSING BAND (replaces credit footer, no "built by" text)
       ════════════════════════════════════════════════════════ */
    .pdf-close {
      margin-top:26px;
      position:relative;
      background:var(--grad-navy);
      border-radius:14px;
      overflow:hidden;
      padding:16px 22px;
      display:flex;
      align-items:center;
      gap:14px;
      break-inside:avoid;
      page-break-inside:avoid;
    }
    .pdf-close::before {
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height:4px;
      background:var(--grad-brand);
    }
    .pdf-close .mark {
      flex:none;
      width:30px; height:30px;
      color:#5b99c3;
    }
    .pdf-close .txt { font-size:10pt; color:#cfe0ee; line-height:1.5; }
    .pdf-close .txt b { color:#fff; font-weight:800; }
    .pdf-close .logo {
      margin-inline-start:auto;
      height:22px; width:auto; opacity:.9;
    }

    /* ── Not-found state ── */
    .notfound {
      text-align:center;
      padding:60px 24px;
      color:var(--muted);
    }
    .notfound h1 { font-size:18pt; color:var(--navy); margin-bottom:8px; }

    /* While loading, keep page blank-ish (Chrome captures after JS) */
    #content[hidden] { display:none; }

    /* Mobile read of the produced PDF / on-screen preview */
    @media screen and (max-width:520px) {
      .page { padding:18px 16px 22px; }
      .cover-title { max-width:100%; font-size:20pt; }
      .flow .step .cap { font-size:8pt; }
    }
  </style>
</head>
<body>

<!-- Running brand header/footer, repeat on every printed A4 page -->
<div class="run-head" aria-hidden="true"></div>

<div class="page">
  <div id="content" hidden></div>
</div>

<div class="run-foot" aria-hidden="true">
  <span class="brand"><span class="dot"></span>סקייל רווחי</span>
  <span class="tag">עסק שיוצר חופש</span>
</div>

<!-- ── Scripts: same loader chain as workbook.html ── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/content.js"></script>
<script>
(function () {
  'use strict';

  var HE_LETTERS = ['א','ב','ג','ד','ה','ו','ז','ח','ט','י'];
  var root = document.getElementById('content');

  /* ── inline SVG icon set (brand-tinted via currentColor) ── */
  var ICON = {

    pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
    quiz: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17"/><circle cx="12" cy="12" r="10"/></svg>',
    brain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.99.13 4 4 0 0 0-2.5 5.62A4 4 0 0 0 6 17a3 3 0 0 0 6 0Z"/><path d="M12 5a3 3 0 1 1 5.99.13 4 4 0 0 1 2.5 5.62A4 4 0 0 1 18 17a3 3 0 0 1-6 0Z"/></svg>',
    star: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l7.1-1.01L12 2z"/></svg>'
  };

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function getOrder() {
    var raw = parseInt(new URLSearchParams(location.search).get('order') || '', 10);
    return (!isNaN(raw) && raw >= 1) ? raw : null;
  }

  function notFound(msg) {
    root.innerHTML =
      '<div class="notfound"><h1>השיעור לא נמצא</h1><p>' +
      esc(msg || 'ייתכן שמספר השיעור אינו קיים בקורס.') + '</p></div>';
    root.hidden = false;
  }

  /* short caption for the steps-flow diagram: first ~4 meaningful words */
  function shortCap(s) {
    var t = String(s == null ? '' : s).replace(/\s+/g, ' ').trim();
    var words = t.split(' ').slice(0, 4).join(' ');
    if (t.split(' ').length > 4) words += '…';
    return esc(words);
  }

  function renderKeyPoints(points) {
    if (!Array.isArray(points) || !points.length) return '';

    // Steps flow diagram, only when it reads like a sequence (3–6 concise points)
    var flow = '';
    var concise = points.every(function (p) { return String(p).length <= 90; });
    if (points.length >= 3 && points.length <= 6 && concise) {
      flow = '<div class="flow">' + points.map(function (pt, i) {
        return '<div class="step"><div class="bubble">' + (i + 1) + '</div>' +
               '<div class="cap">' + shortCap(pt) + '</div></div>';
      }).join('') + '</div>';
    }

    var items = points.map(function (pt, i) {
      return '<li>' +
               '<div class="num-band"><span class="n">' + (i + 1) + '</span></div>' +
               '<div class="body">' +
                 '<span class="tick">' + ICON.check + '</span>' +
                 '<span class="txt">' + esc(pt) + '</span>' +
               '</div>' +
             '</li>';
    }).join('');

    return '' +
      '<section class="section">' +
        '<div class="section-head">' +
          '<span class="ico">' + ICON.bulb + '</span>' +
          '<h2>נקודות מפתח</h2>' +
          '<span class="count">' + points.length + ' עקרונות</span>' +
        '</div>' +
        flow +
        '<ul class="kp">' + items + '</ul>' +
      '</section>';
  }

  function renderQuestions(questions) {
    if (!Array.isArray(questions) || !questions.length) return '';

    var items = questions.map(function (q, qi) {
      var opts = Array.isArray(q.options) ? q.options : [];
      var isOrder = (q.type === 'order_steps');
      var hasAnswer = !isOrder &&
                      typeof q.answer_index === 'number' &&
                      opts[q.answer_index] !== undefined;

      var top =
        '<div class="q-top"><span class="q-num">' + (qi + 1) + '</span>' +
        (isOrder
          ? '<span class="q-tag">' + ICON.brain + 'שאלת חשיבה</span>'
          : '<span class="q-tag">' + ICON.quiz + 'תרגול</span>') +
        '</div>';

      var stem = '<div class="q-stem">' + esc(q.q) + '</div>';

      var optsHtml = '';
      if (opts.length) {
        optsHtml = '<ul class="opts">' + opts.map(function (opt, oi) {
          var correct = (!isOrder && hasAnswer && oi === q.answer_index);
          var letter = HE_LETTERS[oi] || String(oi + 1);
          return '<li' + (correct ? ' class="correct"' : '') + '>' +
                   '<span class="marker">' + letter + '</span>' +
                   '<span>' + esc(opt) + '</span>' +
                   (correct ? '<span class="check">' + ICON.check + 'נכון</span>' : '') +
                 '</li>';
        }).join('') + '</ul>';
      }

      var tail = '';
      if (isOrder) {
        // thinking question, no marked answer, give writing lines
        tail =
          '<div class="think-lines">' +
            '<div class="ln"></div><div class="ln"></div><div class="ln"></div>' +
          '</div>';
      } else if (hasAnswer || q.explanation) {
        var correctLine = '';
        if (hasAnswer) {
          var l = HE_LETTERS[q.answer_index] || String(q.answer_index + 1);
          correctLine = '<div class="correct-line">' + esc(l) + '. ' +
                        esc(opts[q.answer_index]) + '</div>';
        }
        var expLine = q.explanation
          ? '<div class="exp">' + esc(q.explanation) + '</div>' : '';
        tail =
          '<div class="answer">' +
            '<div class="lbl">' + ICON.star + 'התשובה הנכונה</div>' +
            correctLine + expLine +
          '</div>';
      }

      return '<div class="q-item">' + top + stem + optsHtml + tail + '</div>';
    }).join('');

    return '' +
      '<section class="section">' +
        '<div class="section-head">' +
          '<span class="ico red">' + ICON.quiz + '</span>' +
          '<h2>שאלות לתרגול עצמי</h2>' +
          '<span class="count">' + questions.length + ' שאלות</span>' +
        '</div>' +
        '<div class="q">' + items + '</div>' +
      '</section>';
  }

  function renderNotes() {
    var lines = '';
    for (var i = 0; i < 6; i++) lines += '<div class="ln"></div>';
    return '' +
      '<section class="section">' +
        '<div class="section-head">' +
          '<span class="ico navy">' + ICON.pencil + '</span>' +
          '<h2>הערות אישיות</h2>' +
        '</div>' +
        '<div class="notes">' +
          '<p class="hint">' + ICON.pencil + 'מה לקחתי מהשיעור? מה איישם השבוע בעסק שלי?</p>' +
          lines +
        '</div>' +
      '</section>';
  }

  function render(order, lesson) {
    var title = lesson.title || '';
    document.title = 'חוברת סיכום, שיעור ' + order + ': ' + title + ', סקייל רווחי';

    var intro = lesson.description
      ? '<section class="section"><div class="intro"><span class="quote-mark">&#8221;</span>' +
        esc(lesson.description) + '</div></section>'
      : '';

    var html =
      '<header class="cover">' +
        '<img class="emblem" src="assets/sr-emblem-white.png" alt="" />' +
        '<div class="cover-top">' +
          '<img class="cover-logo" src="assets/logo-horizontal-white.png" alt="סקייל רווחי" />' +
          '<span class="cover-eyebrow">חוברת עבודה</span>' +
        '</div>' +
        '<div class="cover-tagline">עסק שיוצר חופש</div>' +
        '<div class="cover-meta">' +
          '<span class="cover-lessonnum"><span class="lbl">שיעור</span><span class="n">' + order + '</span></span>' +
          '<span class="rule"></span>' +
        '</div>' +
        '<h1 class="cover-title">' + esc(title) + '</h1>' +
      '</header>' +
      intro +
      renderKeyPoints(lesson.key_points) +
      renderQuestions(lesson.practice_questions) +
      renderNotes() +
      '<footer class="pdf-close">' +
        '<span class="mark">' + ICON.star + '</span>' +
        '<span class="txt"><b>סקייל רווחי</b> · עסק שיוצר חופש · חוברת העבודה שלך לשיעור ' + order + '. עבור על הנקודות, תרגל, ויישם בעסק.</span>' +
        '<img class="logo" src="assets/logo-horizontal-white.png" alt="סקייל רווחי" />' +
      '</footer>';

    root.innerHTML = html;
    root.hidden = false;
  }

  async function init() {
    var order = getOrder();
    if (!order) { notFound('לא צוין מספר שיעור.'); return; }

    try {
      if (typeof window.SRContent === 'undefined' || typeof window.SRContent.ready === 'undefined') {
        throw new Error('content.js לא נטען.');
      }
      await window.SRContent.ready;
      var lesson = window.SRContent.getLesson(order);
      if (!lesson) { notFound(); return; }
      render(order, lesson);
    } catch (err) {
      notFound('שגיאה בטעינה: ' + err.message);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
