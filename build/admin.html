<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סקייל רווחי, ניהול</title>
  <link rel="stylesheet" href="ds/styles.css" />
  <style>
    /* ─── ריסט ובסיס ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* בחירת הלל: Heebo גם לכותרות (override ל-display של מערכת העיצוב) */
    :root { --font-display: 'Heebo', 'Assistant', system-ui, sans-serif; }

    body {
      min-height: 100vh;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      transition: background .25s, color .25s;
    }

    /* ─── מצב כהה ───────────────────────────────────────────────
       מערכת העיצוב (ds) בהירה בלבד. כאן מחזירים את הטוקנים הכהים
       של הדאשבורד למצב כהה, כדי ששני המצבים יהיו קריאים. */
    body.dark {
      --bg:       #0a1726;
      --surface:  #13243a;
      --ink:      #e2ecf5;
      --navy:     #e2ecf5;            /* כותרות נראות במצב כהה */
      --muted:    #8aa0b4;
      --line:     rgba(255,255,255,.10);
      --shadow:       0 10px 30px rgba(0,0,0,.35);
      --shadow-hover: 0 16px 40px rgba(0,0,0,.45);
      --shadow-modal: 0 24px 64px rgba(0,0,0,.55);
      --blue-fill: rgba(9,146,194,.18);
      --red-fill:  rgba(191,9,47,.18);
      color: var(--ink);
    }
    body.dark .card,
    body.dark .table-wrap,
    body.dark .login-box,
    body.dark .modal-panel { background: var(--surface); border-color: var(--line); }
    body.dark .topbar { background: #0c1c2d; border-color: var(--line); }
    body.dark .lead-row:hover { background: rgba(9,146,194,.14); }
    body.dark .data-table th { background: rgba(9,146,194,.12); }
    body.dark input { background: #1a2d42; color: var(--ink); border-color: #2e4860; }
    body.dark input::placeholder { color: #6a8099; }
    body.dark .chip { filter: brightness(1.18); }
    body.dark .login-screen-bg { background: #060f1a; }

    /* ─── מתגי מסך ───────────────────────────────────────────── */
    #screen-login,
    #screen-dashboard { display: none; }
    #screen-login.active,
    #screen-dashboard.active { display: block; }

    /* ─── מסך כניסה (ממותג · רקע נייבי) ───────────────────────── */
    #screen-login {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background: var(--navy);
    }
    body.dark #screen-login { background: #060f1a; }
    #screen-login.active { display: flex; }

    /* בלוב זוהר ממותג ברקע מסך הכניסה */
    .login-glow {
      position: absolute;
      border-radius: 50%;
      background: var(--grad-brand);
      filter: blur(110px);
      opacity: .22;
      pointer-events: none;
      z-index: 0;
    }
    .login-glow.a { width: 460px; height: 460px; top: -180px; right: -120px; }
    .login-glow.b { width: 380px; height: 380px; bottom: -200px; left: -100px; opacity: .14; }

    .login-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s-6);
      padding: var(--s-5);
      width: 100%;
      max-width: 460px;
    }
    .login-brand { text-align: center; }
    .login-brand h1 {
      font-size: 2.1rem;
      font-weight: 800;
      font-family: var(--font-display);
      letter-spacing: var(--ls-display);
    }
    .login-brand p {
      color: rgba(245,248,252,.7);
      margin-top: .4rem;
      font-size: var(--fs-small);
    }
    .login-box {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-modal);
      padding: var(--s-7) var(--s-6);
      width: 100%;
      overflow: hidden;
    }
    /* קו אנרגיה דו-צבעי עליון, חתימת המותג */
    .login-box::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: var(--grad-brand);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .login-box h2 {
      font-size: var(--fs-h3);
      font-weight: 800;
      font-family: var(--font-heading);
      margin-bottom: var(--s-5);
      color: var(--navy);
    }
    .field { margin-bottom: var(--s-4); }
    .field label {
      display: block;
      font-size: var(--fs-small);
      font-weight: 600;
      margin-bottom: var(--s-2);
      color: var(--navy);
    }
    .field input {
      width: 100%;
      height: 52px;
      padding: 0 var(--s-4);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-md);
      font-size: var(--fs-body);
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--ink);
      transition: border-color var(--dur-hover), box-shadow var(--dur-hover);
      outline: none;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-ring);
    }
    #login-error {
      display: none;
      background: var(--red-fill);
      border: 1px solid rgba(191,9,47,.35);
      border-radius: var(--radius-md);
      padding: var(--s-3) var(--s-4);
      color: var(--red);
      font-size: var(--fs-small);
      margin-bottom: var(--s-4);
    }
    body.dark #login-error {
      background: rgba(191,9,47,.18);
      border-color: rgba(191,9,47,.4);
      color: #ff8da0;
    }
    /* כפתור כניסה ראשי, גרדיינט מותג */
    #login-btn {
      width: 100%;
      min-height: 56px;
      margin-top: var(--s-2);
      border: none;
      border-radius: var(--radius-md);
      background: var(--grad-brand);
      color: #fff;
      font-size: var(--fs-body-l);
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      position: relative;
      transition: transform var(--dur-hover) ease, filter var(--dur-hover) ease;
    }
    #login-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.08); }
    #login-btn:disabled { opacity: .65; cursor: not-allowed; transform: none; }
    .btn-spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── דאשבורד ────────────────────────────────────────────── */
    #screen-dashboard.active {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── Topbar ─────────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      border-bottom: 1px solid var(--on-dark-line);
      padding: var(--s-3) var(--s-6);
      display: flex;
      align-items: center;
      gap: var(--s-4);
    }
    .topbar-brand {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.18rem;
      color: #fff;
      flex: 1;
    }
    .topbar-brand span {
      font-size: var(--fs-micro);
      font-weight: 400;
      color: rgba(245,248,252,.66);
      display: block;
      direction: ltr;
      text-align: right;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--s-3);
    }

    /* מתג כהה/בהיר */
    .theme-toggle {
      background: rgba(255,255,255,.06);
      border: 1.5px solid var(--on-dark-line);
      border-radius: var(--radius-pill);
      padding: .4rem .85rem;
      font-size: var(--fs-small);
      font-family: var(--font-body);
      cursor: pointer;
      color: rgba(245,248,252,.85);
      display: flex;
      align-items: center;
      gap: .35rem;
      transition: border-color var(--dur-hover), color var(--dur-hover), background var(--dur-hover);
    }
    .theme-toggle:hover {
      border-color: var(--blue-light);
      background: rgba(255,255,255,.1);
      color: #fff;
    }
    .theme-icon { font-size: 1rem; }

    .btn-logout {
      background: transparent;
      border: 1.5px solid var(--on-dark-line);
      border-radius: var(--radius-md);
      padding: .45rem .9rem;
      font-size: var(--fs-small);
      font-family: var(--font-body);
      cursor: pointer;
      color: rgba(245,248,252,.85);
      transition: border-color var(--dur-hover), color var(--dur-hover), background var(--dur-hover);
    }
    .btn-logout:hover {
      border-color: var(--red);
      background: rgba(191,9,47,.18);
      color: #fff;
    }

    /* ─── גוף הדאשבורד ───────────────────────────────────────── */
    .dash-body {
      flex: 1;
      padding: var(--s-7) var(--s-6);
      max-width: var(--container);
      width: 100%;
      margin: 0 auto;
    }

    /* ─── כרטיסי Overview ────────────────────────────────────── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--s-4);
      margin-bottom: var(--s-7);
    }
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--s-5) var(--s-5);
      transition: transform var(--dur-hover) ease, box-shadow var(--dur-hover) ease;
    }
    .stat-card { display: flex; flex-direction: column; gap: var(--s-2); overflow: hidden; }
    .stat-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      border-radius: var(--radius) 0 0 var(--radius);
      background: var(--grad-brand);
    }
    .stat-card.accent-blue::before { background: var(--grad-blue); }
    .stat-card.accent-red::before  { background: var(--grad-red); }
    .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .stat-label {
      font-size: var(--fs-small);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .02em;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      font-family: var(--font-display);
      color: var(--navy);
      line-height: 1;
    }
    .stat-card.accent-blue .stat-value { color: var(--blue); }
    .stat-card.accent-red  .stat-value { color: var(--red); }

    .overview-loading,
    .table-loading {
      color: var(--muted);
      font-size: var(--fs-body);
      padding: var(--s-3) 0;
    }

    /* ─── טבלת לידים ─────────────────────────────────────────── */
    .section-title {
      font-family: var(--font-heading);
      font-size: var(--fs-h3);
      font-weight: 800;
      margin-bottom: var(--s-4);
      color: var(--navy);
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow-x: auto;
      margin-bottom: var(--s-6);
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--fs-body);
    }
    .data-table th {
      background: var(--blue-fill);
      color: var(--muted);
      font-weight: 700;
      font-size: var(--fs-micro);
      letter-spacing: .04em;
      padding: var(--s-3) var(--s-4);
      text-align: right;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    .data-table td {
      padding: var(--s-3) var(--s-4);
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }
    .lead-row {
      cursor: pointer;
      transition: background var(--dur-hover);
    }
    .lead-row:hover { background: var(--blue-fill); }
    .lead-row:last-child td { border-bottom: none; }

    /* chip חום */
    .chip {
      display: inline-block;
      padding: .22rem .7rem;
      border-radius: var(--radius-pill);
      font-size: var(--fs-small);
      font-weight: 700;
      letter-spacing: .02em;
    }
    .chip-hot  { background: var(--red-fill);  color: var(--red); }
    .chip-warm { background: rgba(245,158,11,.14); color: #b05c00; }
    .chip-cold { background: var(--blue-fill); color: var(--blue); }
    body.dark .chip-hot  { background: rgba(191,9,47,.22); color: #ff8da0; }
    body.dark .chip-warm { background: rgba(245,158,11,.22); color: #f0b454; }
    body.dark .chip-cold { background: rgba(9,146,194,.22); color: #5bb6e0; }

    .email-cell {
      direction: ltr;
      text-align: right;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .date-cell {
      color: var(--muted);
      font-size: var(--fs-small);
      white-space: nowrap;
    }

    /* ─── Modal פירוט ────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(12,37,66,.55);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: flex-start;
      justify-content: flex-end;
      padding: var(--s-4);
    }
    .modal-overlay.open { display: flex; }
    .modal-panel {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-modal);
      width: 100%;
      max-width: 440px;
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
      padding: var(--s-6);
      display: flex;
      flex-direction: column;
      gap: var(--s-5);
    }
    /* קו אנרגיה עליון על פאנל הפירוט */
    .modal-panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: var(--grad-brand);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .modal-close {
      position: absolute;
      top: var(--s-4);
      left: var(--s-4);
      background: var(--blue-fill);
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      display: grid;
      place-items: center;
      transition: background var(--dur-hover), color var(--dur-hover);
    }
    .modal-close:hover { background: var(--red-fill); color: var(--red); }

    .detail-loading {
      color: var(--muted);
      font-size: var(--fs-body);
    }
    .detail-email {
      font-size: var(--fs-body-l);
      font-weight: 800;
      color: var(--navy);
      word-break: break-all;
      direction: ltr;
      text-align: right;
    }
    .detail-section {
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
    }
    .detail-section h4 {
      font-size: var(--fs-micro);
      letter-spacing: .05em;
      color: var(--blue);
      font-weight: 800;
      margin-bottom: var(--s-1);
    }
    .detail-row {
      display: flex;
      gap: var(--s-3);
      font-size: var(--fs-body);
    }
    .detail-key {
      color: var(--muted);
      min-width: 110px;
      flex-shrink: 0;
    }
    .detail-val {
      font-weight: 600;
      color: var(--ink);
      word-break: break-all;
    }
    .progress-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
    }
    .progress-item {
      display: flex;
      align-items: center;
      gap: var(--s-2);
      font-size: var(--fs-body);
      color: var(--ink);
    }
    .progress-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .progress-dot.done  { background: var(--success); }
    .progress-dot.undone { background: var(--line); border: 1.5px solid var(--muted); }

    /* ─── Empty state ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: var(--s-9) var(--s-4);
      color: var(--muted);
      font-size: var(--fs-body);
    }

    /* ─── פוטר ───────────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: var(--s-5);
      font-size: var(--fs-small);
      color: var(--muted);
      border-top: 1px solid var(--line);
    }
    .footer b { color: var(--navy); font-weight: 700; }

    /* ─── ניהול פופאפים ──────────────────────────────────────── */
    .cta-card { display: flex; flex-direction: column; gap: var(--s-5); }
    .cta-card-head {
      display: flex;
      align-items: center;
      gap: var(--s-3);
    }
    .cta-card-icon {
      flex: none;
      width: 42px; height: 42px;
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 1.3rem;
      background: var(--blue-fill);
    }
    .cta-card-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: var(--fs-body-l);
      color: var(--navy);
    }
    .cta-card-sub {
      font-size: var(--fs-small);
      color: var(--muted);
      margin-top: 1px;
    }
    .cta-loading { color: var(--muted); font-size: var(--fs-body); }
    .cta-form { display: flex; flex-direction: column; gap: var(--s-4); }
    .cta-form .field { margin-bottom: 0; }
    .cta-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-4);
    }
    .cta-form textarea {
      width: 100%;
      padding: var(--s-3) var(--s-4);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-md);
      font-size: var(--fs-body);
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--ink);
      resize: vertical;
      outline: none;
      transition: border-color var(--dur-hover), box-shadow var(--dur-hover);
    }
    .cta-form textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-ring);
    }
    body.dark .cta-form textarea { background: #1a2d42; color: var(--ink); border-color: #2e4860; }
    /* מתג active */
    .cta-switch {
      display: flex;
      align-items: center;
      gap: var(--s-3);
      cursor: pointer;
      user-select: none;
    }
    .cta-switch input { position: absolute; opacity: 0; width: 0; height: 0; }
    .cta-switch-track {
      flex: none;
      width: 46px; height: 26px;
      border-radius: 999px;
      background: var(--line);
      position: relative;
      transition: background var(--dur-hover);
    }
    .cta-switch-thumb {
      position: absolute;
      top: 3px; right: 3px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
      transition: transform var(--dur-hover);
    }
    .cta-switch input:checked + .cta-switch-track { background: var(--success); }
    .cta-switch input:checked + .cta-switch-track .cta-switch-thumb { transform: translateX(-20px); }
    .cta-switch input:focus-visible + .cta-switch-track { box-shadow: 0 0 0 3px var(--blue-ring); }
    .cta-switch-label { font-size: var(--fs-body); color: var(--ink); font-weight: 600; }
    .cta-actions {
      display: flex;
      align-items: center;
      gap: var(--s-4);
      flex-wrap: wrap;
    }
    .cta-save-btn {
      min-height: 48px;
      padding: 0 var(--s-6);
      border: none;
      border-radius: var(--radius-md);
      background: var(--grad-brand);
      color: #fff;
      font-size: var(--fs-body);
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: transform var(--dur-hover), filter var(--dur-hover);
    }
    .cta-save-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.08); }
    .cta-save-btn:disabled { opacity: .65; cursor: not-allowed; transform: none; }
    .cta-status { font-size: var(--fs-small); font-weight: 600; }
    .cta-status.ok  { color: var(--success); }
    .cta-status.err { color: var(--red); }
    @media (max-width: 600px) {
      .cta-form-row { grid-template-columns: 1fr; }
    }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .dash-body { padding: var(--s-5) var(--s-4); }
      .topbar { padding: var(--s-3) var(--s-4); }
      .modal-panel { max-width: 100%; border-radius: var(--radius) var(--radius) 0 0; }
      .modal-overlay { align-items: flex-end; padding: 0; }
    }
  </style>
</head>
<body>

<!-- ════════════════ מסך כניסה ════════════════ -->
<div id="screen-login">
  <div class="login-glow a" aria-hidden="true"></div>
  <div class="login-glow b" aria-hidden="true"></div>
  <div class="login-wrap">
    <div class="login-brand">
      <h1 class="brand-grad-text">סקייל רווחי</h1>
      <p>פאנל ניהול בעלים</p>
    </div>
    <div class="login-box">
      <h2>כניסה לאדמין</h2>
      <div id="login-error" role="alert"></div>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-email">מייל</label>
          <input
            type="email"
            id="login-email"
            name="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
            dir="ltr"
          />
        </div>
        <div class="field">
          <label for="login-pass">סיסמה</label>
          <input
            type="password"
            id="login-pass"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" id="login-btn">כניסה</button>
      </form>
    </div>
  </div>
</div>

<!-- ════════════════ דאשבורד ════════════════ -->
<div id="screen-dashboard">
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-brand">
      סקייל רווחי
      <span id="admin-email-display"></span>
    </div>
    <div class="topbar-actions">
      <button class="theme-toggle" id="theme-toggle-btn" aria-label="החלף מצב כהה/בהיר">
        <span class="theme-icon" id="theme-icon">🌙</span>
        <span id="theme-label">מצב כהה</span>
      </button>
      <button class="btn-logout" id="logout-btn">התנתק</button>
    </div>
  </header>

  <!-- גוף -->
  <main class="dash-body">
    <!-- Overview -->
    <div class="section-title">סקירה כללית</div>
    <div id="overview-container">
      <div class="overview-loading">טוען נתונים...</div>
    </div>

    <!-- טבלת לידים -->
    <div class="section-title" style="margin-top:1.6rem;">לידים</div>
    <div id="leads-container">
      <div class="table-loading">טוען לידים...</div>
    </div>

    <!-- תזכורות וואטסאפ -->
    <style>
      .rem-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:.8rem; }
      .rem-stat { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-md,12px); padding:1rem; text-align:center; }
      .rem-stat .n { font-size:1.7rem; font-weight:800; color:var(--blue,#0992c2); line-height:1; }
      .rem-stat .l { font-size:.8rem; color:var(--muted,#5b6b73); margin-top:.4rem; }
      .rem-recent { margin-top:1rem; font-size:.85rem; }
      .rem-recent div { display:flex; justify-content:space-between; gap:.6rem; padding:.4rem 0; border-bottom:1px solid var(--line); }
      .rem-recent .ok { color:#0a7d2c; } .rem-recent .bad { color:#bf092f; }
    </style>
    <div class="section-title" style="margin-top:2.2rem;">תזכורות וואטסאפ</div>
    <div id="reminders-container" class="card" style="padding:1.2rem;">
      <div class="overview-loading">טוען נתוני תזכורות...</div>
    </div>

    <!-- ניהול פופאפים -->
    <div class="section-title" style="margin-top:2.2rem;">ניהול פופאפים</div>
    <div class="card cta-card">
      <div class="cta-card-head">
        <span class="cta-card-icon" aria-hidden="true">🎯</span>
        <div>
          <div class="cta-card-title">פופאפ סיום שיעור</div>
          <div class="cta-card-sub">מה שהמשתמש רואה אחרי שהוא לוחץ "סיימתי את השיעור"</div>
        </div>
      </div>

      <div id="cta-loading" class="cta-loading">טוען...</div>

      <form id="cta-form" class="cta-form" novalidate style="display:none;">
        <div class="field">
          <label for="cta-title">כותרת</label>
          <input type="text" id="cta-title" maxlength="120" placeholder="כל הכבוד! סיימת עוד שיעור 🎉" />
        </div>
        <div class="field">
          <label for="cta-body">טקסט</label>
          <textarea id="cta-body" rows="3" maxlength="600" placeholder="הודעת עידוד והנעה לפעולה..."></textarea>
        </div>
        <div class="cta-form-row">
          <div class="field">
            <label for="cta-btn-label">תווית כפתור</label>
            <input type="text" id="cta-btn-label" maxlength="60" placeholder="דברו איתי" />
          </div>
          <div class="field">
            <label for="cta-btn-url">קישור כפתור</label>
            <input type="text" id="cta-btn-url" dir="ltr" placeholder="https://wa.me/972549116092" />
          </div>
        </div>
        <label class="cta-switch">
          <input type="checkbox" id="cta-active" />
          <span class="cta-switch-track" aria-hidden="true"><span class="cta-switch-thumb"></span></span>
          <span class="cta-switch-label">פופאפ פעיל (מוצג למשתמשים)</span>
        </label>

        <div class="cta-actions">
          <button type="submit" id="cta-save-btn" class="cta-save-btn">שמור פופאפ</button>
          <span id="cta-status" class="cta-status" role="status"></span>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">נבנה ע"י <b>הלל</b> · סקייל רווחי</footer>
</div>

<!-- ════════════════ Modal פירוט ════════════════ -->
<div class="modal-overlay" id="detail-modal" role="dialog" aria-modal="true" aria-label="פרטי ליד">
  <div class="modal-panel">
    <button class="modal-close" id="modal-close-btn" aria-label="סגור">×</button>
    <div id="detail-container">
      <div class="detail-loading">טוען...</div>
    </div>
  </div>
</div>

<!-- ════════════════ סקריפטים ════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin-data.js"></script>
<script src="js/admin-views.js"></script>
<script>
(async function () {
  'use strict';

  /* ── DOM refs ──────────────────────────────────────────────── */
  const screenLogin     = document.getElementById('screen-login');
  const screenDash      = document.getElementById('screen-dashboard');
  const loginForm       = document.getElementById('login-form');
  const loginEmailEl    = document.getElementById('login-email');
  const loginPassEl     = document.getElementById('login-pass');
  const loginErrorEl    = document.getElementById('login-error');
  const loginBtn        = document.getElementById('login-btn');
  const logoutBtn       = document.getElementById('logout-btn');
  const adminEmailEl    = document.getElementById('admin-email-display');
  const overviewEl      = document.getElementById('overview-container');
  const leadsEl         = document.getElementById('leads-container');
  const detailEl        = document.getElementById('detail-container');
  const detailModal     = document.getElementById('detail-modal');
  const modalCloseBtn   = document.getElementById('modal-close-btn');
  const themeToggleBtn  = document.getElementById('theme-toggle-btn');
  const themeIcon       = document.getElementById('theme-icon');
  const themeLabel      = document.getElementById('theme-label');
  // ניהול פופאפים
  const ctaLoadingEl    = document.getElementById('cta-loading');
  const ctaFormEl       = document.getElementById('cta-form');
  const ctaTitleEl      = document.getElementById('cta-title');
  const ctaBodyEl       = document.getElementById('cta-body');
  const ctaBtnLabelEl   = document.getElementById('cta-btn-label');
  const ctaBtnUrlEl     = document.getElementById('cta-btn-url');
  const ctaActiveEl     = document.getElementById('cta-active');
  const ctaSaveBtn      = document.getElementById('cta-save-btn');
  const ctaStatusEl     = document.getElementById('cta-status');
  let   ctaCurrentId    = null;

  /* ── אתחול AdminData ──────────────────────────────────────── */
  try {
    window.AdminData.init();
  } catch (e) {
    document.body.innerHTML = '<div style="padding:2rem;color:red">שגיאת אתחול: ' + e.message + '</div>';
    return;
  }

  /* ── אתחול AdminViews (אם נדרש) ──────────────────────────── */
  if (window.AdminViews && typeof window.AdminViews.init === 'function') {
    window.AdminViews.init();
  }

  /* ══════════════ מצב כהה / בהיר ══════════════════════════════ */
  const THEME_KEY = 'sr_admin_theme';

  function applyTheme(isDark) {
    document.body.classList.toggle('dark', isDark);
    themeIcon.textContent  = isDark ? '☀️' : '🌙';
    themeLabel.textContent = isDark ? 'מצב בהיר' : 'מצב כהה';
  }

  // טעינת העדפה שמורה
  const savedTheme = localStorage.getItem(THEME_KEY);
  applyTheme(savedTheme === 'dark');

  themeToggleBtn.addEventListener('click', () => {
    const goingDark = !document.body.classList.contains('dark');
    applyTheme(goingDark);
    localStorage.setItem(THEME_KEY, goingDark ? 'dark' : 'light');
  });

  /* ══════════════ עזרי UI ════════════════════════════════════ */
  function showScreen(name) {
    screenLogin.classList.toggle('active', name === 'login');
    screenDash.classList.toggle('active',  name === 'dashboard');
  }

  function showLoginError(msg) {
    loginErrorEl.textContent = msg;
    loginErrorEl.style.display = 'block';
  }
  function clearLoginError() {
    loginErrorEl.textContent = '';
    loginErrorEl.style.display = 'none';
  }

  function setLoginLoading(yes) {
    loginBtn.disabled = yes;
    loginBtn.innerHTML = yes
      ? '<span class="btn-spinner"></span>מתחבר...'
      : 'כניסה';
  }

  function openModal() {
    detailModal.classList.add('open');
  }
  function closeModal() {
    detailModal.classList.remove('open');
  }

  /* ══════════════ טעינת דאשבורד ═══════════════════════════════ */
  async function loadDashboard(user) {
    adminEmailEl.textContent = user?.email ?? '';

    // Overview
    overviewEl.innerHTML = '<div class="overview-loading">טוען נתונים...</div>';
    try {
      const overview = await window.AdminData.getOverview();
      if (window.AdminViews && typeof window.AdminViews.renderOverview === 'function') {
        window.AdminViews.renderOverview(overview, overviewEl);
      } else {
        overviewEl.innerHTML = _defaultOverview(overview);
      }
    } catch (e) {
      overviewEl.innerHTML = '<div class="overview-loading" style="color:var(--red)">שגיאה בטעינת נתוני סקירה</div>';
    }

    // לידים
    leadsEl.innerHTML = '<div class="table-loading">טוען לידים...</div>';
    try {
      const leads = await window.AdminData.getLeads();
      if (window.AdminViews && typeof window.AdminViews.renderLeadsTable === 'function') {
        window.AdminViews.renderLeadsTable(leads, leadsEl, onRowClick);
      } else {
        leadsEl.innerHTML = _defaultLeadsTable(leads, onRowClick);
        _attachRowListeners();
      }
    } catch (e) {
      leadsEl.innerHTML = '<div class="table-loading" style="color:var(--red)">שגיאה בטעינת לידים</div>';
    }

    // פופאפ סיום שיעור
    loadCtaPopup();

    // תזכורות וואטסאפ
    loadReminders();
  }

  /* ══════════════ תזכורות וואטסאפ ═══════════════════════════════ */
  async function loadReminders() {
    const el = document.getElementById('reminders-container');
    if (!el) return;
    try {
      const [stats, recent] = await Promise.all([
        window.AdminData.getReminderStats(),
        window.AdminData.getReminderRecent(),
      ]);
      const card = (n, l) => `<div class="rem-stat"><div class="n">${n ?? 0}</div><div class="l">${l}</div></div>`;
      let html = '<div class="rem-grid">' +
        card(stats?.opted_in_active, 'מאושרים פעילים') +
        card(stats?.sent_7d, 'נשלחו (7 ימים)') +
        card(stats?.failed_7d, 'נכשלו (7 ימים)') +
        card(stats?.pending_queue, 'בתור') +
        card(stats?.unsubscribed, 'הוסרו') +
        '</div>';
      if (Array.isArray(recent) && recent.length) {
        html += '<div class="rem-recent">';
        for (const r of recent) {
          const cls = r.status === 'sent' ? 'ok' : 'bad';
          const when = new Date(r.created_at).toLocaleString('he-IL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
          html += `<div><span>${r.display_name || ', '} · ${r.template || ''}</span><span class="${cls}">${r.status} · ${when}</span></div>`;
        }
        html += '</div>';
      }
      el.innerHTML = html;
    } catch (e) {
      el.innerHTML = '<div class="overview-loading" style="color:var(--red)">שגיאה בטעינת נתוני תזכורות</div>';
    }
  }

  /* ══════════════ ניהול פופאפים ═══════════════════════════════ */
  async function loadCtaPopup() {
    ctaLoadingEl.style.display = 'block';
    ctaFormEl.style.display = 'none';
    ctaStatusEl.textContent = '';
    ctaStatusEl.className = 'cta-status';
    try {
      const cta = await window.AdminData.getCtaPopup();
      ctaCurrentId           = cta?.id ?? null;
      ctaTitleEl.value       = cta?.title ?? '';
      ctaBodyEl.value        = cta?.body ?? '';
      ctaBtnLabelEl.value    = cta?.button_label ?? '';
      ctaBtnUrlEl.value      = cta?.button_url ?? '';
      ctaActiveEl.checked    = cta?.active === true;
    } catch (_) {
      ctaCurrentId = null;
    }
    ctaLoadingEl.style.display = 'none';
    ctaFormEl.style.display = 'flex';
  }

  ctaFormEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    ctaStatusEl.textContent = '';
    ctaStatusEl.className = 'cta-status';
    ctaSaveBtn.disabled = true;
    ctaSaveBtn.textContent = 'שומר...';

    const res = await window.AdminData.saveCtaPopup({
      id:           ctaCurrentId || undefined,
      title:        ctaTitleEl.value.trim(),
      body:         ctaBodyEl.value.trim(),
      button_label: ctaBtnLabelEl.value.trim(),
      button_url:   ctaBtnUrlEl.value.trim(),
      active:       ctaActiveEl.checked,
    });

    ctaSaveBtn.disabled = false;
    ctaSaveBtn.textContent = 'שמור פופאפ';

    if (res.ok) {
      ctaCurrentId = res.data?.id ?? ctaCurrentId;
      ctaStatusEl.textContent = '✅ נשמר בהצלחה';
      ctaStatusEl.className = 'cta-status ok';
    } else {
      ctaStatusEl.textContent = '❌ שמירה נכשלה: ' + (res.error || 'שגיאה');
      ctaStatusEl.className = 'cta-status err';
    }
  });

  /* ── קליק שורת ליד ──────────────────────────────────────────── */
  async function onRowClick(id) {
    openModal();
    detailEl.innerHTML = '<div class="detail-loading">טוען פרטים...</div>';
    try {
      const detail = await window.AdminData.getLeadDetail(id);
      if (window.AdminViews && typeof window.AdminViews.renderLeadDetail === 'function') {
        window.AdminViews.renderLeadDetail(detail, detailEl);
      } else {
        detailEl.innerHTML = _defaultLeadDetail(detail);
      }
    } catch (e) {
      detailEl.innerHTML = '<div style="color:var(--red)">שגיאה בטעינת פרטי הליד</div>';
    }
  }

  /* ══════════════ רינדורים ברירת-מחדל (ב-case ש-admin-views.js לא נטען) ════════════════ */

  function _heatChip(heat) {
    const labels = { hot: 'חם', warm: 'פושר', cold: 'קר' };
    return `<span class="chip chip-${heat}">${labels[heat] ?? heat}</span>`;
  }

  function _fmtDate(iso) {
    if (!iso) return ', ';
    const d = new Date(iso);
    return d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: '2-digit' });
  }

  function _defaultOverview(ov) {
    const stats = [
      { label: 'לידים סה"כ', value: ov.leads,          cls: ''            },
      { label: 'מילאו סקר',  value: ov.surveys,         cls: 'accent-blue' },
      { label: 'חמים',       value: ov.hot,             cls: 'accent-red'  },
      { label: 'פושרים',     value: ov.warm,            cls: ''            },
      { label: 'קרים',       value: ov.cold,            cls: ''            },
      { label: 'שיעורים הושלמו', value: ov.lessonsCompleted, cls: ''      },
      { label: 'XP כולל',    value: ov.totalXp,         cls: ''            },
    ];
    return `<div class="overview-grid">${stats.map(s =>
      `<div class="card stat-card ${s.cls}">
         <div class="stat-label">${s.label}</div>
         <div class="stat-value">${s.value ?? 0}</div>
       </div>`
    ).join('')}</div>`;
  }

  function _defaultLeadsTable(leads) {
    if (!leads || leads.length === 0) {
      return '<div class="empty-state">אין לידים עדיין</div>';
    }
    const rows = leads.map(l =>
      `<tr class="lead-row" data-id="${l.id}">
         <td class="email-cell">${l.email ?? ', '}</td>
         <td>${l.phone ?? ', '}</td>
         <td>${_heatChip(l.heat)}</td>
         <td>${l.lessons_done ?? 0}</td>
         <td class="date-cell">${_fmtDate(l.created_at)}</td>
       </tr>`
    ).join('');
    return `
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>מייל</th>
              <th>טלפון</th>
              <th>חום</th>
              <th>שיעורים</th>
              <th>תאריך</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function _attachRowListeners() {
    leadsEl.querySelectorAll('.lead-row').forEach(row => {
      row.addEventListener('click', () => onRowClick(row.dataset.id));
    });
  }

  function _defaultLeadDetail(d) {
    if (!d || !d.lead) {
      return '<div style="color:var(--muted)">לא נמצאו פרטים</div>';
    }
    const { lead, survey, progress, xp } = d;
    const surveyHtml = survey
      ? `<div class="detail-section">
           <h4>סקר</h4>
           <div class="detail-row"><span class="detail-key">אתגר שיווק</span><span class="detail-val">${survey.marketing_concern ?? ', '}</span></div>
           <div class="detail-row"><span class="detail-key">יעד הכנסה</span><span class="detail-val">${survey.income_goal ?? ', '}</span></div>
           <div class="detail-row"><span class="detail-key">יש צוות?</span><span class="detail-val">${survey.has_team != null ? (survey.has_team ? 'כן' : 'לא') : ', '}</span></div>
         </div>`
      : '<div class="detail-section"><h4>סקר</h4><div style="color:var(--muted);font-size:.88rem">לא מילא סקר</div></div>';

    const progressHtml = progress && progress.length
      ? `<div class="detail-section">
           <h4>התקדמות בשיעורים</h4>
           <ul class="progress-list">
             ${progress.map(p =>
               `<li class="progress-item">
                 <span class="progress-dot ${p.completed ? 'done' : 'undone'}"></span>
                 <span>${p.lesson_id ?? p.id ?? ', '}</span>
               </li>`
             ).join('')}
           </ul>
         </div>`
      : '<div class="detail-section"><h4>התקדמות</h4><div style="color:var(--muted);font-size:.88rem">אין נתוני התקדמות</div></div>';

    return `
      <div class="detail-email">${lead.email}</div>
      <div class="detail-section">
        <h4>פרטים</h4>
        <div class="detail-row"><span class="detail-key">טלפון</span><span class="detail-val">${lead.phone ?? ', '}</span></div>
        <div class="detail-row"><span class="detail-key">סטטוס</span><span class="detail-val">${lead.status ?? ', '}</span></div>
        <div class="detail-row"><span class="detail-key">תאריך רישום</span><span class="detail-val">${_fmtDate(lead.created_at)}</span></div>
        <div class="detail-row"><span class="detail-key">XP כולל</span><span class="detail-val">${xp ?? 0}</span></div>
      </div>
      ${surveyHtml}
      ${progressHtml}
    `;
  }

  /* ══════════════ ניתוב מסכים ══════════════════════════════════ */

  // בדיקת session קיים בעת טעינה
  let existingUser = null;
  try {
    existingUser = await window.AdminData.currentUser();
  } catch (_) {}

  if (existingUser) {
    showScreen('dashboard');
    loadDashboard(existingUser);
  } else {
    showScreen('login');
  }

  /* ══════════════ טופס כניסה ════════════════════════════════════ */
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearLoginError();

    const email = loginEmailEl.value.trim();
    const pass  = loginPassEl.value;

    if (!email || !pass) {
      showLoginError('נא למלא מייל וסיסמה');
      return;
    }

    setLoginLoading(true);
    const result = await window.AdminData.login(email, pass);
    setLoginLoading(false);

    if (result.ok) {
      loginPassEl.value = '';
      showScreen('dashboard');
      const user = await window.AdminData.currentUser();
      loadDashboard(user);
    } else {
      showLoginError('כניסה נכשלה: ' + (result.error ?? 'אימות שגוי'));
    }
  });

  /* ══════════════ התנתקות ═══════════════════════════════════════ */
  logoutBtn.addEventListener('click', async () => {
    await window.AdminData.logout();
    showScreen('login');
    loginEmailEl.value = '';
    loginPassEl.value  = '';
    clearLoginError();
    // ניקוי תצוגה
    overviewEl.innerHTML  = '';
    leadsEl.innerHTML     = '';
    detailEl.innerHTML    = '';
    adminEmailEl.textContent = '';
    ctaFormEl.style.display = 'none';
    ctaLoadingEl.style.display = 'block';
    ctaCurrentId = null;
    closeModal();
  });

  /* ══════════════ סגירת Modal ═══════════════════════════════════ */
  modalCloseBtn.addEventListener('click', closeModal);

  detailModal.addEventListener('click', (e) => {
    if (e.target === detailModal) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

})();
</script>
</body>
</html>
