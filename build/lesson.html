<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <!--sr-funnel-gate--><script>(function(){try{if(location.search.indexOf("dev=1")>-1)return;var e=localStorage.getItem("sr_user_email");var p=localStorage.getItem("sr_concern")||localStorage.getItem("sr_lesson_id")||localStorage.getItem("sr_access_token");if(!e){location.replace("index.html");return;}if(!p){location.replace("survey.html");return;}}catch(_){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שיעור — סקייל רווחי</title>
  <link rel="stylesheet" href="../מותג/brand-system.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body, sans-serif); background: var(--color-bg, #f5f5f5); color: var(--color-text, #1a1a1a); min-height: 100vh; display: flex; flex-direction: column; }

    /* ─── Header ─── */
    .page-header { background: var(--color-surface, #fff); border-bottom: 1px solid var(--color-border, #e0e0e0); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--color-primary, #2563eb); text-decoration: none; font-size: 14px; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }
    .page-header h1 { font-size: 20px; font-weight: 700; flex: 1; }

    /* ─── Main ─── */
    .main-content { flex: 1; max-width: 900px; width: 100%; margin: 32px auto; padding: 0 20px 40px; }

    /* ─── Loading / Error ─── */
    .state-card { background: var(--color-surface, #fff); border-radius: var(--radius-lg, 12px); padding: 40px; text-align: center; box-shadow: var(--shadow-sm, 0 1px 4px rgba(0,0,0,.08)); }
    .state-card p { color: var(--color-muted, #666); font-size: 16px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--color-border, #e0e0e0); border-top-color: var(--color-primary, #2563eb); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Video embed ─── */
    .embed-wrapper { background: #000; border-radius: var(--radius-lg, 12px); overflow: hidden; aspect-ratio: 16/9; position: relative; }
    .embed-wrapper iframe { width: 100%; height: 100%; border: 0; display: block; }

    /* ─── Prompt card ─── */
    .prompt-card { background: var(--color-surface, #fff); border-radius: var(--radius-lg, 12px); padding: 28px 32px; box-shadow: var(--shadow-sm, 0 1px 4px rgba(0,0,0,.08)); border-right: 4px solid var(--color-primary, #2563eb); }
    .prompt-card h3 { font-size: 15px; font-weight: 600; color: var(--color-muted, #666); margin-bottom: 12px; }
    .prompt-text { white-space: pre-wrap; font-size: 16px; line-height: 1.7; margin-bottom: 20px; }
    .btn-copy { display: inline-flex; align-items: center; gap: 8px; background: var(--color-primary, #2563eb); color: #fff; border: none; border-radius: var(--radius-md, 8px); padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn-copy:hover { opacity: .88; }

    /* ─── Fallback link card ─── */
    .link-card { background: var(--color-surface, #fff); border-radius: var(--radius-lg, 12px); padding: 32px; text-align: center; box-shadow: var(--shadow-sm, 0 1px 4px rgba(0,0,0,.08)); }
    .link-card p { color: var(--color-muted, #666); margin-bottom: 16px; }
    .btn-external { display: inline-block; background: var(--color-primary, #2563eb); color: #fff; text-decoration: none; padding: 10px 24px; border-radius: var(--radius-md, 8px); font-weight: 600; }
    .btn-external:hover { opacity: .88; }

    /* ─── Lesson meta ─── */
    .lesson-meta { margin-top: 28px; background: var(--color-surface, #fff); border-radius: var(--radius-lg, 12px); padding: 28px 32px; box-shadow: var(--shadow-sm, 0 1px 4px rgba(0,0,0,.08)); }
    .lesson-description { font-size: 16px; line-height: 1.75; color: var(--color-text, #1a1a1a); margin-bottom: 20px; }
    .key-points-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .key-points-list { list-style: none; padding: 0; }
    .key-points-list li { padding: 8px 0; border-bottom: 1px solid var(--color-border, #e0e0e0); font-size: 15px; line-height: 1.6; }
    .key-points-list li:last-child { border-bottom: none; }
    .key-points-list li::before { content: "✦ "; color: var(--color-primary, #2563eb); font-size: 13px; }

    /* ─── Complete button ─── */
    .actions { margin-top: 28px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .actions-left { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-complete { background: var(--color-success, #16a34a); color: #fff; border: none; border-radius: var(--radius-md, 8px); padding: 12px 28px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
    .btn-complete:hover { opacity: .88; }
    .btn-complete:disabled { opacity: .5; cursor: default; }
    .complete-msg { margin-top: 12px; text-align: right; font-size: 14px; color: var(--color-success, #16a34a); font-weight: 600; display: none; }
    .btn-practice { background: var(--color-primary, #2563eb); color: #fff; text-decoration: none; border-radius: var(--radius-md, 8px); padding: 12px 24px; font-size: 15px; font-weight: 700; display: inline-block; transition: opacity .2s; }
    .btn-practice:hover { opacity: .88; }
    .btn-next { background: transparent; color: var(--color-primary, #2563eb); border: 2px solid var(--color-primary, #2563eb); border-radius: var(--radius-md, 8px); padding: 10px 22px; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; transition: background .2s, color .2s; }
    .btn-next:hover { background: var(--color-primary, #2563eb); color: #fff; }

    /* ─── Footer ─── */
    footer { text-align: center; padding: 16px; font-size: 12px; color: var(--color-muted, #999); border-top: 1px solid var(--color-border, #e0e0e0); }
  </style>
</head>
<body>

<header class="page-header">
  <a href="courses.html" class="back-link">&#8594; חזרה לקורסים</a>
  <h1 id="lesson-title">טוען שיעור...</h1>
</header>

<main class="main-content">
  <!-- Loading state -->
  <div id="state-loading" class="state-card">
    <div class="spinner"></div>
    <p>טוען את השיעור...</p>
  </div>

  <!-- Error state -->
  <div id="state-error" class="state-card" style="display:none;">
    <p id="error-msg">לא ניתן לטעון את השיעור. בדוק את הכתובת ונסה שוב.</p>
  </div>

  <!-- Lesson content -->
  <div id="lesson-content" style="display:none;">
    <div id="embed-area"></div>

    <!-- Description + key points -->
    <div id="lesson-meta" class="lesson-meta" style="display:none;">
      <p id="lesson-description" class="lesson-description"></p>
      <div id="key-points-block" style="display:none;">
        <p class="key-points-title">נקודות מפתח</p>
        <ul id="key-points-list" class="key-points-list"></ul>
      </div>
    </div>

    <div class="actions">
      <div class="actions-left">
        <a id="btn-practice" class="btn-practice" style="display:none;">תרגול ↗</a>
        <a id="btn-next" class="btn-next" style="display:none;">השיעור הבא ←</a>
      </div>
      <div>
        <button id="btn-complete" class="btn-complete">סיימתי את השיעור ✓</button>
        <div id="complete-msg" class="complete-msg">השיעור סומן כהושלם!</div>
      </div>
    </div>
  </div>
</main>

<footer>נבנה ע"י הלל</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/content.js"></script>
<script src="js/survey-config.js"></script>
<script>
(function () {
  /* ─── Helpers ─── */
  function qs(sel) { return document.querySelector(sel); }
  function show(el) { el.style.display = ''; }
  function hide(el) { el.style.display = 'none'; }

  /* ─── URL params ─── */
  const params      = new URLSearchParams(location.search);
  const recParam    = params.get('rec');
  const orderParam  = parseInt(params.get('order') || '1', 10);
  const lessonOrder = isNaN(orderParam) || orderParam < 1 ? 1 : orderParam;

  /* ─── viewer identity ─── */
  const viewer = localStorage.getItem('sr_user_email') || null;

  /* ──────────────────────────────────────────────
   * buildEmbed(embedUrl) — multi-provider core
   *
   * Receives embed_url from SRContent (already a player URL).
   * For Vimeo with private hash the value is already:
   *   https://player.vimeo.com/video/<id>?h=<hash>
   * so we use it as-is in the iframe src — no URL reconstruction.
   *
   * Also handles raw share URLs for Loom / YouTube / Vimeo
   * in case embed_url contains a share link instead.
   *
   * Handles:
   *   player.vimeo.com/video/...  — already a player URL → use directly
   *   Loom   — loom.com/share/<id> OR loom.com/embed/<id>
   *   Vimeo  — vimeo.com/<id>  (numeric id, optional /hash)
   *   YouTube — youtube.com/watch?v=<id>  OR youtu.be/<id>
   *             OR youtube.com/embed/<id>
   *   Prompt — starts with  prompt:  → PromptCopyTool card
   *   Fallback — external link card
   * ────────────────────────────────────────────── */
  function buildEmbed(rawUrl) {
    const area = qs('#embed-area');

    /* ── prompt: prefix ── */
    if (rawUrl.startsWith('prompt:')) {
      const text = rawUrl.slice('prompt:'.length).trim();
      const card = document.createElement('div');
      card.className = 'prompt-card';
      card.innerHTML = `
        <h3>פרומפט לעבודה</h3>
        <pre class="prompt-text" id="prompt-text-node"></pre>
        <button class="btn-copy" id="btn-copy-prompt">📋 העתק פרומפט</button>`;
      area.appendChild(card);
      card.querySelector('#prompt-text-node').textContent = text;
      card.querySelector('#btn-copy-prompt').addEventListener('click', function () {
        navigator.clipboard.writeText(text).then(() => {
          this.textContent = '✅ הועתק!';
          setTimeout(() => { this.textContent = '📋 העתק פרומפט'; }, 2000);
        });
      });
      return;
    }

    let embedSrc = null;

    /* ── Already a Vimeo player URL (private hash included) ── */
    // e.g. https://player.vimeo.com/video/123456789?h=abc123
    if (rawUrl.includes('player.vimeo.com/video/')) {
      embedSrc = rawUrl;
    }

    /* ── Loom ── */
    if (!embedSrc) {
      const loomMatch = rawUrl.match(/loom\.com\/(?:share|embed)\/([a-zA-Z0-9]+)/);
      if (loomMatch) {
        embedSrc = `https://www.loom.com/embed/${loomMatch[1]}`;
      }
    }

    /* ── Vimeo share URL ── */
    // matches: vimeo.com/<numeric-id>  (optional trailing /hash or ?...)
    if (!embedSrc) {
      const vimeoMatch = rawUrl.match(/vimeo\.com\/(\d+)/);
      if (vimeoMatch) {
        embedSrc = `https://player.vimeo.com/video/${vimeoMatch[1]}`;
      }
    }

    /* ── YouTube ── */
    if (!embedSrc) {
      let ytId = null;
      const ytWatch = rawUrl.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
      const ytShort = rawUrl.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
      const ytEmbed = rawUrl.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
      if (ytWatch)       ytId = ytWatch[1];
      else if (ytShort)  ytId = ytShort[1];
      else if (ytEmbed)  ytId = ytEmbed[1];
      if (ytId) embedSrc = `https://www.youtube.com/embed/${ytId}`;
    }

    /* ── render iframe or fallback ── */
    if (embedSrc) {
      const wrap = document.createElement('div');
      wrap.className = 'embed-wrapper';
      const iframe = document.createElement('iframe');
      iframe.src             = embedSrc;
      iframe.allowFullscreen = true;
      iframe.allow           = 'autoplay; fullscreen; picture-in-picture';
      wrap.appendChild(iframe);
      area.appendChild(wrap);
    } else {
      const card = document.createElement('div');
      card.className = 'link-card';
      card.innerHTML = `
        <p>הסרטון מתארח בפלטפורמה חיצונית. לחץ לצפייה:</p>
        <a class="btn-external" href="${encodeURI(rawUrl)}" target="_blank" rel="noopener noreferrer">
          פתח סרטון ↗
        </a>`;
      area.appendChild(card);
    }
  }

  /* ─── Boot ─── */
  async function init() {

    /* ═══════════════════════════════════════════════════
     * ?rec=<concern>  — שיעור מומלץ מהשאלון
     *
     * concern ∈ { no_leads | irrelevant_leads_paid |
     *             irrelevant_leads_no_paid | hard_to_sell }
     *
     * מקור: window.SURVEY.lessonMap[concern]
     *   → { title: string, video_url: string }
     *   video_url מגיע **כמו שהוא** מ-survey-config.js
     *   (player.vimeo.com עם ?h= או בלי) — מועבר ישר ל-buildEmbed.
     * ═══════════════════════════════════════════════════ */
    if (recParam) {
      const validConcerns = ['no_leads', 'irrelevant_leads_paid', 'irrelevant_leads_no_paid', 'hard_to_sell'];
      if (!validConcerns.includes(recParam)) {
        showError('קוד הבעיה שהתקבל אינו מוכר. נסה לחזור לשאלון ולנסות שנית.');
        return;
      }

      /* וודא ש-survey-config.js נטען */
      if (!window.SURVEY || !window.SURVEY.lessonMap) {
        showError('הגדרות השאלון לא נטענו. רענן את הדף ונסה שוב.');
        return;
      }

      const recLesson = window.SURVEY.lessonMap[recParam];
      if (!recLesson || !recLesson.video_url) {
        showError('לא נמצא שיעור מומלץ לבעיה זו. פנה לתמיכה.');
        return;
      }

      /* כותרת */
      const title = recLesson.title || 'שיעור מומלץ';
      qs('#lesson-title').textContent = title;
      document.title = title + ' — סקייל רווחי';

      /* נגן (video_url כמו שהוא) */
      buildEmbed(recLesson.video_url);

      /* הצג תוכן, הסתר טעינה; אין key_points לשיעור מומלץ */
      hide(qs('#state-loading'));
      show(qs('#lesson-content'));
      return;
    }

    /* ═══════════════════════════════════════════════════
     * מסלול רגיל — ?order=N דרך SRContent
     * ═══════════════════════════════════════════════════ */
    try {
      /* Wait for SRContent to finish loading its data */
      if (typeof window.SRContent === 'undefined' || typeof window.SRContent.ready === 'undefined') {
        throw new Error('content.js לא נטען. בדוק שהקובץ js/content.js קיים.');
      }
      await window.SRContent.ready;

      const lesson = window.SRContent.getLesson(lessonOrder);

      if (!lesson) {
        showError('השיעור לא נמצא. ייתכן שמספר השיעור אינו קיים בקורס.');
        return;
      }

      /* Render title */
      qs('#lesson-title').textContent = lesson.title || 'שיעור';
      document.title = (lesson.title || 'שיעור') + ' — סקייל רווחי';

      /* Build embed from embed_url (used as-is — includes private Vimeo hash) */
      const embedUrl = lesson.embed_url || '';
      if (embedUrl) {
        buildEmbed(embedUrl);
      } else {
        const area = qs('#embed-area');
        area.innerHTML = '<p style="color:var(--color-muted,#666);text-align:center;padding:32px 0;">אין סרטון זמין לשיעור זה.</p>';
      }

      /* Render description */
      const metaBlock = qs('#lesson-meta');
      const descEl    = qs('#lesson-description');
      if (lesson.description) {
        descEl.textContent = lesson.description;
        show(metaBlock);
      }

      /* Render key points */
      const kpBlock = qs('#key-points-block');
      const kpList  = qs('#key-points-list');
      if (Array.isArray(lesson.key_points) && lesson.key_points.length > 0) {
        lesson.key_points.forEach(function (pt) {
          const li = document.createElement('li');
          li.textContent = pt;
          kpList.appendChild(li);
        });
        show(kpBlock);
        show(metaBlock);
      }

      /* Practice button */
      const btnPractice = qs('#btn-practice');
      btnPractice.href = `features/game/index.html?order=${lessonOrder}`;
      show(btnPractice);

      /* Next lesson button — check if next exists */
      const nextLesson = window.SRContent.getLesson(lessonOrder + 1);
      if (nextLesson) {
        const btnNext = qs('#btn-next');
        btnNext.href = `lesson.html?order=${lessonOrder + 1}`;
        show(btnNext);
      }

      /* Show content, hide loader */
      hide(qs('#state-loading'));
      show(qs('#lesson-content'));

      /* Track view (fire-and-forget, backward-compat with portalData MOCK) */
      const pd = window.portalData;
      if (viewer && typeof pd?.recordLessonView === 'function') {
        pd.recordLessonView(String(lessonOrder), null, viewer).catch(() => {});
      }

      /* Mark complete button */
      const btnComplete = qs('#btn-complete');
      const completeMsg = qs('#complete-msg');

      btnComplete.addEventListener('click', async function () {
        btnComplete.disabled = true;
        btnComplete.textContent = 'שומר...';
        try {
          if (typeof pd?.markLessonComplete === 'function') {
            await pd.markLessonComplete(String(lessonOrder), null, viewer);
          }
          btnComplete.textContent = '✅ הושלם';
          completeMsg.style.display = 'block';
        } catch (e) {
          btnComplete.disabled = false;
          btnComplete.textContent = 'סיימתי את השיעור ✓';
          alert('שגיאה בשמירה. נסה שוב.');
        }
      });

    } catch (err) {
      showError('שגיאה בטעינה: ' + err.message);
    }
  }

  function showError(msg) {
    hide(qs('#state-loading'));
    qs('#error-msg').textContent = msg;
    show(qs('#state-error'));
  }

  /* Wait for DOM then boot */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
